<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Editar Medicamento</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
</head>

<body class="container mt-4">

<h1 class="text-center">Editar Medicamento</h1>

<form id="formMedicamento">

  <div class="row">

    <div class="col-md-6 mb-3">
      <label>Nombre</label>
      <input type="text" id="nombre" class="form-control">
    </div>

    <div class="col-md-6 mb-3">
      <label>Categoría</label>
      <input type="text" id="categoria" class="form-control">
    </div>

    <div class="col-md-6 mb-3">
      <label>Dosis Recomendada</label>
      <input type="text" id="dosisRecomendada" class="form-control">
    </div>

    <div class="col-md-6 mb-3">
      <label>Efectos Secundarios</label>
      <input type="text" id="efectosSecundarios" class="form-control">
    </div>

    <div class="col-md-6 mb-3">
      <label>Requiere Prescripción</label>
      <select id="requierePrescripcion" class="form-control">
        <option value="true">Sí</option>
        <option value="false">No</option>
      </select>
    </div>

  </div>

  <button type="submit" class="btn btn-primary">Actualizar</button>
  <a href="medicamentos.html" class="btn btn-secondary">Cancelar</a>

</form>

<script>
$(document).ready(function () {
  const params = new URLSearchParams(window.location.search);
  const id = params.get("id");

  if (!id) {
    alert("ID no proporcionado");
    window.location.href = "medicamentos.html";
    return;
  }

  $.ajax({
    url: "http://localhost:3000/api/medicamentos/" + id,
    type: "GET",
    success: function (m) {
      $("#nombre").val(m.nombre);
      $("#categoria").val(m.categoria);
      $("#dosisRecomendada").val(m.dosisRecomendada);
      $("#efectosSecundarios").val(
        Array.isArray(m.efectosSecundarios)
          ? m.efectosSecundarios.join(", ")
          : (m.efectosSecundarios || "")
      );
      $("#requierePrescripcion").val(String(m.requierePrescripcion));
    },
    error: function () {
      alert("Error al cargar medicamento");
      window.location.href = "medicamentos.html";
    }
  });

  $("#formMedicamento").submit(function (e) {
    e.preventDefault();

    let datos = {};

    if ($("#nombre").val()) datos.nombre = $("#nombre").val();
    if ($("#categoria").val()) datos.categoria = $("#categoria").val();
    if ($("#dosisRecomendada").val()) {
      datos.dosisRecomendada = $("#dosisRecomendada").val();
    }

    datos.efectosSecundarios = $("#efectosSecundarios")
      .val()
      .split(",")
      .map((efecto) => efecto.trim())
      .filter((efecto) => efecto);

    datos.requierePrescripcion = $("#requierePrescripcion").val() === "true";

    $.ajax({
      url: "http://localhost:3000/api/medicamentos/" + id,
      type: "PUT",
      data: JSON.stringify(datos),
      contentType: "application/json",
      success: function () {
        alert("Medicamento actualizado correctamente");
        window.location.href = "medicamentos.html";
      },
      error: function () {
        alert("Error al actualizar medicamento");
      }
    });
  });
});
</script>

</body>
</html>
