<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Crear Medicamento</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
</head>

<body class="container mt-4">

<h1 class="text-center">Registrar Medicamento</h1>

<form id="formMedicamento">

  <div class="row">

    <div class="col-md-6 mb-3">
      <label>Nombre</label>
    <input type="text" id="nombre" class="form-control">
    </div>

    <div class="col-md-6 mb-3">
      <label>Categoría</label>
      <input type="text" id="categoria" class="form-control">
    </div>

    <div class="col-md-6 mb-3">
      <label>Dosis Recomendada</label>
      <input type="text" id="dosisRecomendada" class="form-control">
    </div>

    <div class="col-md-6 mb-3">
      <label>Efectos Secundarios</label>
      <input type="text" id="efectosSecundarios" class="form-control">

    </div>
        <div class="col-md-6 mb-3">
          <label>Requiere Prescripcion</label>
          <select id="requierePrescripcion" class="form-control">
            <option value="true">Sí</option>
            <option value="false">No</option>
          </select>
        </div>
      </div>

  </div>

  <button type="submit" class="btn btn-primary">Guardar</button>

</form>

<script>
      $(document).ready(function () {
        $("#formMedicamento").submit(function (m) {
          m.preventDefault();

          let datos = {
            nombre: $("#nombre").val(),
            categoria: $("#categoria").val(),
            dosisRecomendada: $("#dosisRecomendada").val(),
            efectosSecundarios: $("#efectosSecundarios")
              .val()
              .split(",")
              .map((efecto) => efecto.trim())
              .filter((efecto) => efecto),
            requierePrescripcion: $("#requierePrescripcion").val() === "true",
          };

          console.log(datos);

          if (!datos.nombre.trim() || !datos.categoria.trim() || !datos.dosisRecomendada) {
            alert("Faltan datos obligatorios");
            return;
          }

          $.ajax({
            type: "POST",
            url: "http://localhost:3000/api/medicamentos",
            data: JSON.stringify(datos),
            contentType: "application/json",
            success: function (response) {
              console.log(response);
              alert("Medicamento creado correctamente");
              $("#formMedicamento")[0].reset();
            },
            error: function (error) {
              console.log(error);
              alert("Error al guardar el medicamento");
            },
          });
        });
      });
    </script>
  </body>
</html>
