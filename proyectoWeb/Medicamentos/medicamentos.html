<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Medicamentos</title>

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- jQuery -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
  </head>

  <body class="container mt-4">
    <h1 class="text-center mb-4">Lista de Medicamentos</h1>

    <!-- TABLA -->
    <table class="table table-striped table-hover shadow">
      <thead class="table-dark">
        <tr>
          <th>Nombre</th>
          <th>Categoría</th>
          <th>Dosis_Recomendada</th>
          <th>Efectos_Secundarios</th>
          <th>Requiere_Prescripción</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody id="tablaMedicamentos"></tbody>
    </table>

    <script>
      $(document).ready(function () {
        listar();

        function listar() {
          $.ajax({
            url: "http://localhost:3000/api/medicamentos",
            type: "GET",
            success: function (data) {
              let tabla = $("#tablaMedicamentos");
              tabla.empty();

              if (data.length === 0) {
                tabla.append(
                  "<tr><td colspan='6'>No hay medicamentos registrados</td></tr>",
                );
                return;
              }

              data.forEach((m) => {
                const efectosSecundarios = Array.isArray(m.efectosSecundarios)
                  ? m.efectosSecundarios.join(", ")
                  : (m.efectosSecundarios || "");

                tabla.append(`
            <tr>
              <td>${m.nombre}</td>
              <td>${m.categoria}</td>
              <td>${m.dosisRecomendada}</td>
              <td>${efectosSecundarios}</td>
              <td>${m.requierePrescripcion ? "Sí" : "No"}</td>
              <td>
                  <button class="btn btn-warning btn-sm" onclick="window.location.href='edit.html?id=${m._id}'">Editar</button>
                  <button class="btn btn-danger btn-sm" onclick="eliminar('${m._id}')">Eliminar</button>
              </td>
            </tr>
          `);
              });
            },
            error: function () {
              alert("Error al cargar medicamentos");
            },
          });
        }

        window.eliminar = function (id) {
          if (!confirm("¿Seguro que deseas eliminar el medicamento?")) return;

          $.ajax({
            url: "http://localhost:3000/api/medicamentos/" + id,
            type: "DELETE",
            success: function () {
              listar();
            },
            error: function () {
              alert("Error al eliminar");
            },
          });
        };
      });
    </script>

    <!-- CARD -->
    <div class="row mt-5">
      <div class="col-md-4">
        <div class="card text-center shadow">
          <div class="card-body">
            <h5 class="card-title">Medicamentos</h5>
            <p class="card-text">Registrar nueva medicamentos</p>
            <a href="create.html" class="btn btn-primary">Insertar</a>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
