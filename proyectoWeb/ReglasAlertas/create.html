<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Crear Regla de Alerta</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
  </head>

  <body class="container mt-4">
    <h1 class="text-center mb-4">Crear Regla de Alerta</h1>

    <form id="formReglasAlertas" class="shadow p-4 rounded">
      <!-- Información General -->
      <div class="row mb-4">
        <h3 class="col-12 mb-3">Información General</h3>

        <div class="col-md-6 mb-3">
          <label for="nombre" class="form-label">Nombre de la Regla</label>
          <input
            type="text"
            id="nombre"
            class="form-control"
            placeholder="Ej: Presión Alta Crítica"
            required
          />
        </div>

        <div class="col-md-6 mb-3">
          <label for="severidad" class="form-label">Severidad</label>
          <select id="severidad" class="form-control" required>
            <option value="">Seleccione</option>
            <option value="baja">Baja</option>
            <option value="media">Media</option>
            <option value="alta">Alta</option>
          </select>
        </div>
      </div>

      <!-- Condición -->
      <div class="row mb-4">
        <h3 class="col-12 mb-3">Condición</h3>

        <div class="col-md-4 mb-3">
          <label for="sintoma" class="form-label">Síntoma</label>
          <input
            type="text"
            id="sintoma"
            class="form-control"
            placeholder="Ej: presionArterial, temperatura"
            required
          />
        </div>

        <div class="col-md-4 mb-3">
          <label for="operador" class="form-label">Operador</label>
          <select id="operador" class="form-control" required>
            <option value="">Seleccione</option>
            <option value=">=">&gt;=</option>
            <option value="<=">&lt;=</option>
            <option value="==">=</option>
            <option value="!=">!=</option>
            <option value=">">&gt;</option>
            <option value="<">&lt;</option>
          </select>
        </div>

        <div class="col-md-4 mb-3">
          <label for="valor" class="form-label">Valor</label>
          <input
            type="text"
            id="valor"
            class="form-control"
            placeholder="Ej: 180, 38.5, crítico"
            required
          />
        </div>

        <div class="col-md-6 mb-3">
          <label for="diasConsecutivos" class="form-label">Días Consecutivos</label>
          <input
            type="number"
            id="diasConsecutivos"
            class="form-control"
            value="1"
            min="1"
            required
          />
        </div>
      </div>

      <!-- Opciones -->
      <div class="row mb-4">
        <h3 class="col-12 mb-3">Opciones</h3>

        <div class="col-md-6 mb-3">
          <div class="form-check form-switch">
            <input
              class="form-check-input"
              type="checkbox"
              id="notificarDoctor"
              checked
            />
            <label class="form-check-label" for="notificarDoctor">
              Notificar al Doctor
            </label>
          </div>
        </div>

        <div class="col-md-6 mb-3">
          <div class="form-check form-switch">
            <input
              class="form-check-input"
              type="checkbox"
              id="activa"
              checked
            />
            <label class="form-check-label" for="activa">
              Activar Regla
            </label>
          </div>
        </div>
      </div>

      <!-- Botones -->
      <div class="row">
        <div class="col-12">
          <button type="submit" class="btn btn-primary">Guardar Regla</button>
          <button type="reset" class="btn btn-danger">Limpiar</button>
          <a href="reglasAlertas.html" class="btn btn-secondary">Volver</a>
        </div>
      </div>
    </form>

    <script>
      $(document).ready(function () {
        $("#formReglasAlertas").submit(function (e) {
          e.preventDefault();

          let datos = {
            nombre: $("#nombre").val(),
            condicion: {
              sintoma: $("#sintoma").val(),
              operador: $("#operador").val(),
              valor: $("#valor").val(),
              diasConsecutivos: parseInt($("#diasConsecutivos").val()),
            },
            severidad: $("#severidad").val(),
            notificarDoctor: $("#notificarDoctor").is(":checked"),
            activa: $("#activa").is(":checked"),
          };

          // Validaciones
          if (
            !datos.nombre ||
            !datos.condicion.sintoma ||
            !datos.condicion.operador ||
            !datos.condicion.valor ||
            !datos.severidad
          ) {
            alert("Faltan datos requeridos");
            return;
          }

          console.log("Datos enviados:", datos);

          $.ajax({
            type: "POST",
            url: "http://localhost:3000/api/reglas-alertas",
            data: JSON.stringify(datos),
            contentType: "application/json",
            success: function (response) {
              console.log(response);
              alert("Regla de alerta creada correctamente");
              window.location.href = "reglasAlertas.html";
            },
            error: function (xhr) {
              console.error(xhr);
              alert(
                "Error al guardar la regla: " + (xhr.responseJSON?.message || xhr.statusText),
              );
            },
          });
        });
      });
    </script>
  </body>
</html>
