<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Editar Regla de Alerta</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
  </head>

  <body class="container mt-4">
    <h1 class="text-center mb-4">Editar Regla de Alerta</h1>

    <form id="formReglasAlertas" class="shadow p-4 rounded">
      <!-- Información General -->
      <div class="row mb-4">
        <h3 class="col-12 mb-3">Información General</h3>

        <div class="col-md-6 mb-3">
          <label for="nombre" class="form-label">Nombre de la Regla</label>
          <input
            type="text"
            id="nombre"
            class="form-control"
            placeholder="Ej: Presión Alta Crítica"
          />
        </div>

        <div class="col-md-6 mb-3">
          <label for="severidad" class="form-label">Severidad</label>
          <select id="severidad" class="form-control">
            <option value="">Seleccione</option>
            <option value="baja">Baja</option>
            <option value="media">Media</option>
            <option value="alta">Alta</option>
          </select>
        </div>
      </div>

      <!-- Condición -->
      <div class="row mb-4">
        <h3 class="col-12 mb-3">Condición</h3>

        <div class="col-md-4 mb-3">
          <label for="sintoma" class="form-label">Síntoma</label>
          <input
            type="text"
            id="sintoma"
            class="form-control"
            placeholder="Ej: presionArterial, temperatura"
          />
        </div>

        <div class="col-md-4 mb-3">
          <label for="operador" class="form-label">Operador</label>
          <select id="operador" class="form-control">
            <option value="">Seleccione</option>
            <option value=">=">&gt;=</option>
            <option value="<=">&lt;=</option>
            <option value="==">=</option>
            <option value="!=">!=</option>
            <option value=">">&gt;</option>
            <option value="<">&lt;</option>
          </select>
        </div>

        <div class="col-md-4 mb-3">
          <label for="valor" class="form-label">Valor</label>
          <input
            type="text"
            id="valor"
            class="form-control"
            placeholder="Ej: 180, 38.5, crítico"
          />
        </div>

        <div class="col-md-6 mb-3">
          <label for="diasConsecutivos" class="form-label">Días Consecutivos</label>
          <input
            type="number"
            id="diasConsecutivos"
            class="form-control"
            min="1"
          />
        </div>
      </div>

      <!-- Opciones -->
      <div class="row mb-4">
        <h3 class="col-12 mb-3">Opciones</h3>

        <div class="col-md-6 mb-3">
          <div class="form-check form-switch">
            <input
              class="form-check-input"
              type="checkbox"
              id="notificarDoctor"
            />
            <label class="form-check-label" for="notificarDoctor">
              Notificar al Doctor
            </label>
          </div>
        </div>

        <div class="col-md-6 mb-3">
          <div class="form-check form-switch">
            <input
              class="form-check-input"
              type="checkbox"
              id="activa"
            />
            <label class="form-check-label" for="activa">
              Activar Regla
            </label>
          </div>
        </div>
      </div>

      <!-- Botones -->
      <div class="row">
        <div class="col-12">
          <button type="submit" class="btn btn-primary">Actualizar Regla</button>
          <a href="reglasAlertas.html" class="btn btn-secondary">Cancelar</a>
        </div>
      </div>
    </form>

    <script>
      $(document).ready(function () {
        const params = new URLSearchParams(window.location.search);
        const id = params.get("id");

        if (!id) {
          alert("ID no proporcionado");
          window.location.href = "reglasAlertas.html";
          return;
        }

        // Cargar datos de la regla
        $.ajax({
          url: "http://localhost:3000/api/reglasAlertas/" + id,
          type: "GET",
          success: function (r) {
            $("#nombre").val(r.nombre);
            $("#severidad").val(r.severidad);
            $("#sintoma").val(r.condicion.sintoma);
            $("#operador").val(r.condicion.operador);
            $("#valor").val(r.condicion.valor);
            $("#diasConsecutivos").val(r.condicion.diasConsecutivos);
            $("#notificarDoctor").prop("checked", r.notificarDoctor);
            $("#activa").prop("checked", r.activa);
          },
          error: function () {
            alert("Error al cargar la regla de alerta");
            window.location.href = "reglasAlertas.html";
          },
        });

        // Enviar cambios
        $("#formReglasAlertas").submit(function (e) {
          e.preventDefault();

          let datos = {
            nombre: $("#nombre").val(),
            condicion: {
              sintoma: $("#sintoma").val(),
              operador: $("#operador").val(),
              valor: $("#valor").val(),
              diasConsecutivos: parseInt($("#diasConsecutivos").val()),
            },
            severidad: $("#severidad").val(),
            notificarDoctor: $("#notificarDoctor").is(":checked"),
            activa: $("#activa").is(":checked"),
          };

          // Validaciones
          if (
            !datos.nombre ||
            !datos.condicion.sintoma ||
            !datos.condicion.operador ||
            !datos.condicion.valor ||
            !datos.severidad
          ) {
            alert("Faltan datos requeridos");
            return;
          }

          console.log("Datos enviados:", datos);

          $.ajax({
            url: "http://localhost:3000/api/reglasAlertas/" + id,
            type: "PUT",
            data: JSON.stringify(datos),
            contentType: "application/json",
            success: function (response) {
              console.log(response);
              alert("Regla de alerta actualizada correctamente");
              window.location.href = "reglasAlertas.html";
            },
            error: function (xhr) {
              console.error(xhr);
              alert(
                "Error al actualizar la regla: " + (xhr.responseJSON?.message || xhr.statusText),
              );
            },
          });
        });
      });
    </script>
  </body>
</html>
