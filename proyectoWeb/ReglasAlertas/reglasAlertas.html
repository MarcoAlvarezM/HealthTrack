<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Reglas de Alertas</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
  </head>

  <body class="container mt-4">
    <h1 class="text-center mb-4">Reglas de Alertas</h1>

    <!-- TABLA -->
    <table class="table table-striped table-hover shadow">
      <thead class="table-dark">
        <tr>
          <th>Nombre</th>
          <th>Síntoma</th>
          <th>Condición</th>
          <th>Severidad</th>
          <th>Notificar Doctor</th>
          <th>Activa</th>
          <th>Fecha Creación</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody id="tablaReglasAlertas"></tbody>
    </table>

    <script>
      $(document).ready(function () {
        listar();

        function listar() {
          $.ajax({
            url: "http://localhost:3000/api/reglasAlertas",
            type: "GET",
            success: function (data) {
              let tabla = $("#tablaReglasAlertas");
              tabla.empty();

              if (data.length === 0) {
                tabla.append(
                  "<tr><td colspan='8'>No hay reglas de alertas registradas</td></tr>",
                );
                return;
              }

              data.forEach((r) => {
                let fecha = new Date(r.creado).toLocaleDateString("es-ES");
                let condicion = `${r.condicion.sintoma} ${r.condicion.operador} ${r.condicion.valor}`;
                
                tabla.append(`
            <tr>
              <td>${r.nombre}</td>
              <td>${r.condicion.sintoma}</td>
              <td>${condicion}</td>
              <td>
                <span class="badge ${getBadgeClass(r.severidad)}">${r.severidad}</span>
              </td>
              <td>${r.notificarDoctor ? "Sí" : "No"}</td>
              <td>
                <span class="badge ${r.activa ? "bg-success" : "bg-danger"}">${r.activa ? "Sí" : "No"}</span>
              </td>
              <td>${fecha}</td>
              <td>
                <button class="btn btn-warning btn-sm" onclick="window.location.href='edit.html?id=${r._id}'">Editar</button>
                <button class="btn btn-danger btn-sm" onclick="eliminar('${r._id}')">Eliminar</button>
              </td>
            </tr>
          `);
              });
            },
            error: function () {
              alert("Error al cargar reglas de alertas");
            },
          });
        }

        window.getBadgeClass = function (severidad) {
          switch (severidad) {
            case "baja":
              return "bg-info";
            case "media":
              return "bg-warning";
            case "alta":
              return "bg-danger";
            default:
              return "bg-secondary";
          }
        };

        window.eliminar = function (id) {
          if (!confirm("¿Seguro que deseas eliminar la regla de alerta?")) return;

          $.ajax({
            url: "http://localhost:3000/api/reglasAlertas/" + id,
            type: "DELETE",
            success: function () {
              listar();
            },
            error: function () {
              alert("Error al eliminar");
            },
          });
        };
      });
    </script>

    <!-- CARD -->
    <div class="row mt-5">
      <div class="col-md-4">
        <div class="card text-center shadow">
          <div class="card-body">
            <h5 class="card-title">Reglas de Alertas</h5>
            <p class="card-text">Crear nueva regla de alerta</p>
            <a href="create.html" class="btn btn-primary">Insertar</a>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
