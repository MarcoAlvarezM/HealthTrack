<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Crear Reporte Diario</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
  </head>

  <body class="container mt-4">
    <h1 class="text-center mb-4">Crear Reporte Diario</h1>

    <form id="formReporteDiario" class="shadow p-4 rounded">
      <!-- Selecciones -->
      <div class="row mb-4">
        <h3 class="col-12 mb-3">Información del Reporte</h3>

        <div class="col-md-6 mb-3">
          <label for="pacienteId" class="form-label">Paciente</label>
          <select id="pacienteId" class="form-control" required></select>
        </div>

        <div class="col-md-6 mb-3">
          <label for="planTratamientoId" class="form-label">Tratamiento</label>
          <select id="planTratamientoId" class="form-control" required></select>
        </div>

        <div class="col-md-6 mb-3">
          <label for="fecha" class="form-label">Fecha</label>
          <input
            type="date"
            id="fecha"
            class="form-control"
            required
          />
        </div>

        <div class="col-md-6 mb-3">
          <label for="estado" class="form-label">Estado General</label>
          <select id="estado" class="form-control" required>
            <option value="">Seleccione</option>
            <option value="bueno">Bueno</option>
            <option value="regular">Regular</option>
            <option value="malo">Malo</option>
          </select>
        </div>
      </div>

      <!-- Síntomas y Medicamento -->
      <div class="row mb-4">
        <h3 class="col-12 mb-3">Síntomas y Medicamento</h3>

        <div class="col-md-12 mb-3">
          <label for="sintomas" class="form-label">Síntomas (JSON)</label>
          <textarea
            id="sintomas"
            class="form-control"
            placeholder='Ej: {"presionArterial": 140, "temperatura": 37.5}'
            rows="4"
          ></textarea>
          <small class="text-muted">Ingrese los síntomas en formato JSON</small>
        </div>

        <div class="col-md-6 mb-3">
          <div class="form-check form-switch">
            <input
              class="form-check-input"
              type="checkbox"
              id="medicamentoTomado"
              required
            />
            <label class="form-check-label" for="medicamentoTomado">
              ¿Tomó el medicamento?
            </label>
          </div>
        </div>
      </div>

      <!-- Notas -->
      <div class="row mb-4">
        <h3 class="col-12 mb-3">Observaciones</h3>

        <div class="col-md-12 mb-3">
          <label for="notas" class="form-label">Notas Adicionales</label>
          <textarea
            id="notas"
            class="form-control"
            placeholder="Describe cualquier observación adicional"
            rows="4"
          ></textarea>
        </div>
      </div>

      <!-- Botones -->
      <div class="row">
        <div class="col-12">
          <button type="submit" class="btn btn-primary">Guardar Reporte</button>
          <button type="reset" class="btn btn-danger">Limpiar</button>
          <a href="reportesDiarios.html" class="btn btn-secondary">Volver</a>
        </div>
      </div>
    </form>

    <script>
      $(document).ready(function () {
        // Cargar fecha actual
        let hoy = new Date().toISOString().split("T")[0];
        $("#fecha").val(hoy);
        $("#medicamentoTomado").prop("required", false);
        $("#sintomas")
          .closest(".col-md-12")
          .html(`
            <label class="form-label">Síntomas</label>
            <div id="camposSintomas" class="row g-3"></div>
            <small class="text-muted">Los campos se cargan desde el catálogo de síntomas.</small>
          `);

        cargarPacientes();
        cargarTratamientos();
        cargarCamposSintomas();

        function cargarPacientes() {
          $.ajax({
            url: "http://localhost:3000/api/pacientes",
            type: "GET",
            success: function (data) {
              let select = $("#pacienteId");
              select.empty();
              select.append('<option value="">Seleccione un paciente</option>');

              data.forEach((p) => {
                select.append(
                  `<option value="${p._id}">${p.nombre} ${p.apellido}</option>`,
                );
              });
            },
            error: function () {
              alert("Error al cargar pacientes");
            },
          });
        }

        function cargarTratamientos() {
          $.ajax({
            url: "http://localhost:3000/api/tratamientos",
            type: "GET",
            success: function (data) {
              let select = $("#planTratamientoId");
              select.empty();
              select.append('<option value="">Seleccione un tratamiento</option>');

              data.forEach((t) => {
                let pacienteNombre = t.paciente_id
                  ? `${t.paciente_id.nombre || ""} ${t.paciente_id.apellido || ""}`.trim()
                  : "Paciente sin nombre";
                let consultaTexto = t.consulta_id?.diagnostico || t.consulta_id?._id || "Consulta";
                let inicio = t.fecha_inicio
                  ? new Date(t.fecha_inicio).toLocaleDateString("es-ES")
                  : "Sin fecha";
                let fin = t.fecha_fin
                  ? new Date(t.fecha_fin).toLocaleDateString("es-ES")
                  : "Sin fecha";

                select.append(
                  `<option value="${t._id}">${pacienteNombre} - ${consultaTexto} (${inicio} a ${fin})</option>`,
                );
              });
            },
            error: function () {
              alert("Error al cargar tratamientos");
            },
          });
        }

        function cargarCamposSintomas() {
          $.ajax({
            url: "http://localhost:3000/api/catalogosintomas",
            type: "GET",
            success: function (data) {
              let contenedor = $("#camposSintomas");
              contenedor.empty();

              if (!data || data.length === 0) {
                contenedor.append(
                  '<div class="col-12"><div class="alert alert-warning mb-0">No hay síntomas configurados en el catálogo.</div></div>',
                );
                return;
              }

              data.forEach((s) => {
                if (s.tipo === "booleano") {
                  contenedor.append(`
                    <div class="col-md-6 sintoma-item" data-nombre="${s.nombre}" data-tipo="${s.tipo}">
                      <div class="form-check form-switch mt-4">
                        <input class="form-check-input sintoma-valor" type="checkbox" id="sintoma_${s._id}">
                        <label class="form-check-label" for="sintoma_${s._id}">${s.etiqueta}</label>
                      </div>
                    </div>
                  `);
                  return;
                }

                if (s.tipo === "escala") {
                  contenedor.append(`
                    <div class="col-md-6 sintoma-item" data-nombre="${s.nombre}" data-tipo="${s.tipo}">
                      <label for="sintoma_${s._id}" class="form-label">${s.etiqueta}</label>
                      <input
                        type="number"
                        id="sintoma_${s._id}"
                        class="form-control sintoma-valor"
                        min="${s.escalaMinima ?? ""}"
                        max="${s.escalaMaxima ?? ""}"
                        placeholder="${s.escalaMinima ?? ""} - ${s.escalaMaxima ?? ""}"
                      />
                    </div>
                  `);
                  return;
                }

                contenedor.append(`
                  <div class="col-md-6 sintoma-item" data-nombre="${s.nombre}" data-tipo="${s.tipo}">
                    <label for="sintoma_${s._id}" class="form-label">${s.etiqueta}</label>
                    <input
                      type="text"
                      id="sintoma_${s._id}"
                      class="form-control sintoma-valor"
                      placeholder="Ingrese un valor"
                    />
                  </div>
                `);
              });
            },
            error: function () {
              alert("Error al cargar el catálogo de síntomas");
            },
          });
        }

        $("#formReporteDiario").submit(function (e) {
          e.preventDefault();

          let sintomasText = $("#sintomas").val();
          let sintomas = {};

          if (sintomasText.trim()) {
            try {
              sintomas = JSON.parse(sintomasText);
            } catch (error) {
              alert("Error: Los síntomas no son un JSON válido");
              return;
            }
          }

          let datos = {
            pacienteId: $("#pacienteId").val(),
            planTratamientoId: $("#planTratamientoId").val(),
            fecha: $("#fecha").val(),
            medicamentoTomado: $("#medicamentoTomado").is(":checked"),
            sintomas: sintomas,
            estado: $("#estado").val(),
            notas: $("#notas").val(),
          };

          // Validaciones
          if (
            !datos.pacienteId ||
            !datos.planTratamientoId ||
            !datos.fecha ||
            !datos.estado
          ) {
            alert("Faltan datos requeridos");
            return;
          }

          console.log("Datos enviados:", datos);

          $.ajax({
            type: "POST",
            url: "http://localhost:3000/api/reportes-diarios",
            data: JSON.stringify(datos),
            contentType: "application/json",
            success: function (response) {
              console.log(response);
              alert("Reporte diario creado correctamente");
              window.location.href = "reportesDiarios.html";
            },
            error: function (xhr) {
              console.error(xhr);
              alert(
                "Error al guardar el reporte: " + (xhr.responseJSON?.message || xhr.statusText),
              );
            },
          });
        });

        $("#formReporteDiario").off("submit").on("submit", function (e) {
          e.preventDefault();

          let sintomas = {};

          $("#camposSintomas .sintoma-item").each(function () {
            const nombre = $(this).data("nombre");
            const tipo = $(this).data("tipo");
            const campo = $(this).find(".sintoma-valor");

            if (tipo === "booleano") {
              sintomas[nombre] = campo.is(":checked");
              return;
            }

            const valor = campo.val();
            if (valor === "") {
              return;
            }

            sintomas[nombre] = tipo === "escala" ? Number(valor) : valor;
          });

          let datos = {
            pacienteId: $("#pacienteId").val(),
            planTratamientoId: $("#planTratamientoId").val(),
            fecha: $("#fecha").val(),
            medicamentoTomado: $("#medicamentoTomado").is(":checked"),
            sintomas: sintomas,
            estado: $("#estado").val(),
            notas: $("#notas").val(),
          };

          if (
            !datos.pacienteId ||
            !datos.planTratamientoId ||
            !datos.fecha ||
            !datos.estado
          ) {
            alert("Faltan datos requeridos");
            return;
          }

          console.log("Datos enviados:", datos);

          $.ajax({
            type: "POST",
            url: "http://localhost:3000/api/reportes-diarios",
            data: JSON.stringify(datos),
            contentType: "application/json",
            success: function (response) {
              console.log(response);
              alert("Reporte diario creado correctamente");
              window.location.href = "reportesDiarios.html";
            },
            error: function (xhr) {
              console.error(xhr);
              alert(
                "Error al guardar el reporte: " + (xhr.responseJSON?.message || xhr.statusText),
              );
            },
          });
        });
      });
    </script>
  </body>
</html>
