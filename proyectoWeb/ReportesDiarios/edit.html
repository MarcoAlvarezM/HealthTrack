<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Editar Reporte Diario</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
  </head>

  <body class="container mt-4">
    <h1 class="text-center mb-4">Editar Reporte Diario</h1>

    <form id="formReporteDiario" class="shadow p-4 rounded">
      <!-- Selecciones -->
      <div class="row mb-4">
        <h3 class="col-12 mb-3">Información del Reporte</h3>

        <div class="col-md-6 mb-3">
          <label for="pacienteId" class="form-label">Paciente</label>
          <select id="pacienteId" class="form-control"></select>
        </div>

        <div class="col-md-6 mb-3">
          <label for="planTratamientoId" class="form-label">Tratamiento</label>
          <select id="planTratamientoId" class="form-control"></select>
        </div>

        <div class="col-md-6 mb-3">
          <label for="fecha" class="form-label">Fecha</label>
          <input
            type="date"
            id="fecha"
            class="form-control"
          />
        </div>

        <div class="col-md-6 mb-3">
          <label for="estado" class="form-label">Estado General</label>
          <select id="estado" class="form-control">
            <option value="">Seleccione</option>
            <option value="bueno">Bueno</option>
            <option value="regular">Regular</option>
            <option value="malo">Malo</option>
          </select>
        </div>
      </div>

      <!-- Síntomas y Medicamento -->
      <div class="row mb-4">
        <h3 class="col-12 mb-3">Síntomas y Medicamento</h3>

        <div class="col-md-12 mb-3">
          <label for="sintomas" class="form-label">Síntomas (JSON)</label>
          <textarea
            id="sintomas"
            class="form-control"
            placeholder='Ej: {"presionArterial": 140, "temperatura": 37.5}'
            rows="4"
          ></textarea>
          <small class="text-muted">Ingrese los síntomas en formato JSON</small>
        </div>

        <div class="col-md-6 mb-3">
          <div class="form-check form-switch">
            <input
              class="form-check-input"
              type="checkbox"
              id="medicamentoTomado"
            />
            <label class="form-check-label" for="medicamentoTomado">
              ¿Tomó el medicamento?
            </label>
          </div>
        </div>
      </div>

      <!-- Notas -->
      <div class="row mb-4">
        <h3 class="col-12 mb-3">Observaciones</h3>

        <div class="col-md-12 mb-3">
          <label for="notas" class="form-label">Notas Adicionales</label>
          <textarea
            id="notas"
            class="form-control"
            placeholder="Describe cualquier observación adicional"
            rows="4"
          ></textarea>
        </div>
      </div>

      <!-- Botones -->
      <div class="row">
        <div class="col-12">
          <button type="submit" class="btn btn-primary">Actualizar Reporte</button>
          <a href="reportesDiarios.html" class="btn btn-secondary">Cancelar</a>
        </div>
      </div>
    </form>

    <script>
      $(document).ready(function () {
        const params = new URLSearchParams(window.location.search);
        const id = params.get("id");

        if (!id) {
          alert("ID no proporcionado");
          window.location.href = "reportesDiarios.html";
          return;
        }

        cargarPacientes();
        cargarTratamientos();
        cargarReporte();

        function cargarPacientes() {
          $.ajax({
            url: "http://localhost:3000/api/pacientes",
            type: "GET",
            success: function (data) {
              let select = $("#pacienteId");
              select.empty();

              data.forEach((p) => {
                select.append(
                  `<option value="${p._id}">${p.nombre} ${p.apellido}</option>`,
                );
              });
            },
            error: function () {
              alert("Error al cargar pacientes");
            },
          });
        }

        function cargarTratamientos() {
          $.ajax({
            url: "http://localhost:3000/api/tratamientos",
            type: "GET",
            success: function (data) {
              let select = $("#planTratamientoId");
              select.empty();

              data.forEach((t) => {
                select.append(
                  `<option value="${t._id}">${t.nombre}</option>`,
                );
              });
            },
            error: function () {
              alert("Error al cargar tratamientos");
            },
          });
        }

        function cargarReporte() {
          $.ajax({
            url: "http://localhost:3000/api/reportesDiarios/" + id,
            type: "GET",
            success: function (r) {
              $("#pacienteId").val(r.pacienteId._id);
              $("#planTratamientoId").val(r.planTratamientoId._id);
              $("#fecha").val(r.fecha.split("T")[0]);
              $("#medicamentoTomado").prop("checked", r.medicamentoTomado);
              $("#sintomas").val(JSON.stringify(r.sintomas, null, 2));
              $("#estado").val(r.estado);
              $("#notas").val(r.notas);
            },
            error: function () {
              alert("Error al cargar el reporte diario");
              window.location.href = "reportesDiarios.html";
            },
          });
        }

        $("#formReporteDiario").submit(function (e) {
          e.preventDefault();

          let sintomasText = $("#sintomas").val();
          let sintomas = {};

          if (sintomasText.trim()) {
            try {
              sintomas = JSON.parse(sintomasText);
            } catch (error) {
              alert("Error: Los síntomas no son un JSON válido");
              return;
            }
          }

          let datos = {
            pacienteId: $("#pacienteId").val(),
            planTratamientoId: $("#planTratamientoId").val(),
            fecha: $("#fecha").val(),
            medicamentoTomado: $("#medicamentoTomado").is(":checked"),
            sintomas: sintomas,
            estado: $("#estado").val(),
            notas: $("#notas").val(),
          };

          // Validaciones
          if (
            !datos.pacienteId ||
            !datos.planTratamientoId ||
            !datos.fecha ||
            !datos.estado
          ) {
            alert("Faltan datos requeridos");
            return;
          }

          console.log("Datos enviados:", datos);

          $.ajax({
            url: "http://localhost:3000/api/reportesDiarios/" + id,
            type: "PUT",
            data: JSON.stringify(datos),
            contentType: "application/json",
            success: function (response) {
              console.log(response);
              alert("Reporte diario actualizado correctamente");
              window.location.href = "reportesDiarios.html";
            },
            error: function (xhr) {
              console.error(xhr);
              alert(
                "Error al actualizar el reporte: " + (xhr.responseJSON?.message || xhr.statusText),
              );
            },
          });
        });
      });
    </script>
  </body>
</html>
