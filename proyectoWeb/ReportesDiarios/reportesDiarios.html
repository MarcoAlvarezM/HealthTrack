<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Reportes Diarios</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
  </head>

  <body class="container mt-4">
    <h1 class="text-center mb-4">Reportes Diarios</h1>

    <!-- TABLA -->
    <table class="table table-striped table-hover shadow">
      <thead class="table-dark">
        <tr>
          <th>Paciente</th>
          <th>Tratamiento</th>
          <th>Fecha</th>
          <th>Medicamento Tomado</th>
          <th>Estado</th>
          <th>Notas</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody id="tablaReportesDiarios"></tbody>
    </table>

    <script>
      $(document).ready(function () {
        listar();

        function listar() {
          $.ajax({
            url: "http://localhost:3000/api/reportesDiarios",
            type: "GET",
            success: function (data) {
              let tabla = $("#tablaReportesDiarios");
              tabla.empty();

              if (data.length === 0) {
                tabla.append(
                  "<tr><td colspan='7'>No hay reportes diarios registrados</td></tr>",
                );
                return;
              }

              data.forEach((r) => {
                let fecha = new Date(r.fecha).toLocaleDateString("es-ES");
                let pacienteNombre = r.pacienteId
                  ? r.pacienteId.nombre + " " + r.pacienteId.apellido
                  : "N/A";
                let tratamientoNombre = r.planTratamientoId
                  ? r.planTratamientoId.nombre
                  : "N/A";

                tabla.append(`
            <tr>
              <td>${pacienteNombre}</td>
              <td>${tratamientoNombre}</td>
              <td>${fecha}</td>
              <td>
                <span class="badge ${r.medicamentoTomado ? "bg-success" : "bg-danger"}">${r.medicamentoTomado ? "Sí" : "No"}</span>
              </td>
              <td>
                <span class="badge ${getBadgeClass(r.estado)}">${r.estado}</span>
              </td>
              <td>${r.notas || "-"}</td>
              <td>
                <button class="btn btn-warning btn-sm" onclick="window.location.href='edit.html?id=${r._id}'">Editar</button>
                <button class="btn btn-danger btn-sm" onclick="eliminar('${r._id}')">Eliminar</button>
              </td>
            </tr>
          `);
              });
            },
            error: function () {
              alert("Error al cargar reportes diarios");
            },
          });
        }

        window.getBadgeClass = function (estado) {
          switch (estado) {
            case "bueno":
              return "bg-success";
            case "regular":
              return "bg-warning";
            case "malo":
              return "bg-danger";
            default:
              return "bg-secondary";
          }
        };

        window.eliminar = function (id) {
          if (!confirm("¿Seguro que deseas eliminar el reporte diario?")) return;

          $.ajax({
            url: "http://localhost:3000/api/reportesDiarios/" + id,
            type: "DELETE",
            success: function () {
              listar();
            },
            error: function () {
              alert("Error al eliminar");
            },
          });
        };
      });
    </script>

    <!-- CARD -->
    <div class="row mt-5">
      <div class="col-md-4">
        <div class="card text-center shadow">
          <div class="card-body">
            <h5 class="card-title">Reportes Diarios</h5>
            <p class="card-text">Registrar nuevo reporte diario</p>
            <a href="create.html" class="btn btn-primary">Insertar</a>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
