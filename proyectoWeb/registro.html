<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Registro</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-4">

<h2>Registro de Usuario</h2>

<form id="form">

  <!-- DATOS USUARIO -->
  <input class="form-control mb-2" id="correo" placeholder="Correo" required>
  <input class="form-control mb-2" id="contrasena" placeholder="Contraseña" required>

  <select class="form-control mb-2" id="role">
    <option value="Paciente">Paciente</option>
    <option value="Doctor">Doctor</option>
  </select>

  <!-- DATOS GENERALES -->
  <input class="form-control mb-2" id="nombre" placeholder="Nombre" required>
  <input class="form-control mb-2" id="apellido" placeholder="Apellido">

  <!-- SOLO PACIENTE -->
  <div id="pacienteFields">
    <select class="form-control mb-2" id="genero">
      <option value="masculino">Masculino</option>
      <option value="femenino">Femenino</option>
    </select>

    <input class="form-control mb-2" id="tipoSangre" placeholder="Tipo de sangre">
  </div>

  <!-- SOLO DOCTOR -->
  <div id="doctorFields" style="display:none;">
    <input class="form-control mb-2" id="especialidad" placeholder="Especialidad">
    <input class="form-control mb-2" id="telefono" placeholder="Teléfono">
  </div>

  <button class="btn btn-primary">Guardar</button>

</form>

<script type="module" src="./js/registro.js"></script>

</body>
</html>
