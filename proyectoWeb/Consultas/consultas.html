<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Consultas</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- jQuery -->
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
</head>

<body class="container mt-4">

<h1 class="text-center mb-4">Lista de Consultas</h1>

<!-- TABLA -->
<table class="table table-striped table-hover shadow">
  <thead class="table-dark">
    <tr>
      <th>Paciente</th>
      <th>Doctor</th>
      <th>Fecha</th>
      <th>Estado</th>
      <th>Diagnóstico</th>
      <th>Acciones</th>
    </tr>
  </thead>
  <tbody id="tablaConsultas"></tbody>
</table>

<script>
$(document).ready(function () {

  listar();

  function listar() {
    $.ajax({
      url: "http://localhost:3000/api/consultas",
      type: "GET",
      success: function (data) {

        let tabla = $("#tablaConsultas");
        tabla.empty();

        if (data.length === 0) {
          tabla.append("<tr><td colspan='6'>No hay consultas registradas</td></tr>");
          return;
        }

        data.forEach(c => {

          let fecha = new Date(c.fecha).toISOString().split("T")[0];

          let estadoBadge = "";

          if (c.estado === "pendiente") {
            estadoBadge = `<span class="badge bg-warning text-dark">Pendiente</span>`;
          } else if (c.estado === "confirmada") {
            estadoBadge = `<span class="badge bg-success">Confirmada</span>`;
          } else {
            estadoBadge = `<span class="badge bg-danger">Cancelada</span>`;
          }

          tabla.append(`
            <tr>
              <td>${c.paciente_id}</td>
              <td>${c.doctor_id ? c.doctor_id.nombre : "N/A"}</td>
              <td>${fecha}</td>
              <td>${estadoBadge}</td>
              <td>${c.diagnostico}</td>
              <td>
                <button class="btn btn-danger btn-sm"
                  onclick="eliminar('${c._id}')">
                  Eliminar
                </button>
              </td>
            </tr>
          `);

        });

      },
      error: function () {
        alert("Error al cargar consultas");
      }
    });
  }

  window.eliminar = function(id) {
    if (!confirm("¿Seguro que deseas eliminar esta consulta?")) return;

    $.ajax({
      url: "http://localhost:3000/api/consultas/" + id,
      type: "DELETE",
      success: function () {
        listar();
      },
      error: function () {
        alert("Error al eliminar");
      }
    });
  }

});
</script>

<!-- CARD -->
<div class="row mt-5">

  <div class="col-md-4">
    <div class="card text-center shadow">
      <div class="card-body">
        <h5 class="card-title">Consultas</h5>
        <p class="card-text">Registrar nueva consulta</p>
        <a href="create.html" class="btn btn-primary">Insertar</a>
      </div>
    </div>
  </div>

</div>

</body>
</html>
