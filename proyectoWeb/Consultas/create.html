<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Crear Consulta</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
</head>

<body class="container mt-4">

<h1 class="text-center">Registrar Consulta</h1>

<form id="formConsulta">

  <div class="row">

    <div class="col-md-6 mb-3">
      <label>Paciente</label>
      <select id="paciente_id" class="form-control"></select>
    </div>

    <div class="col-md-6 mb-3">
      <label>Doctor</label>
      <select id="doctor_id" class="form-control"></select>
    </div>

    <div class="col-md-6 mb-3">
      <label>Fecha</label>
      <input type="date" id="fecha" class="form-control">
    </div>

    <div class="col-md-6 mb-3">
      <label>Estado</label>
      <select id="estado" class="form-control">
        <option value="pendiente">Pendiente</option>
        <option value="confirmada">Confirmada</option>
        <option value="cancelada">Cancelada</option>
      </select>
    </div>

    <div class="col-md-12 mb-3">
      <label>Diagnóstico</label>
      <input type="text" id="diagnostico" class="form-control">
    </div>

    <div class="col-md-12 mb-3">
      <label>Notas</label>
      <textarea id="notas" class="form-control"></textarea>
    </div>

  </div>

  <button type="submit" class="btn btn-primary">Guardar</button>

</form>

<script>
$(document).ready(function () {

  // Pacientes
  $.get("http://localhost:3000/api/pacientes", function (data) {
    data.forEach(p => {
      $("#paciente_id").append(
        `<option value="${p._id}">${p.nombre} ${p.apellido}</option>`
      );
    });
  });

  // Doctores
  $.get("http://localhost:3000/api/doctores", function (data) {
    data.forEach(d => {
      $("#doctor_id").append(
        `<option value="${d._id}">${d.nombre} (${d.especialidad})</option>`
      );
    });
  });

  $("#formConsulta").submit(function (e) {
    e.preventDefault();

    let datos = {
      paciente_id: $("#paciente_id").val(),
      doctor_id: $("#doctor_id").val(),
      fecha: $("#fecha").val(),
      diagnostico: $("#diagnostico").val(),
      notas: $("#notas").val(),
      estado: $("#estado").val()
    };

 $.ajax({
      url: "http://localhost:3000/api/consultas",
      type: "POST",
      data: JSON.stringify(datos),
       contentType: "application/json",
      success: function (response) {
         console.log(response);
        alert("Consulta creada");
        $("#formConsulta")[0].reset();
      }
    });

  });

});
</script>

</body>
</html>
