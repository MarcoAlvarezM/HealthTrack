<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Editar Consulta</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
</head>

<body class="container mt-4">

<h1 class="text-center">Editar Consulta</h1>

<form id="formConsulta">

  <div class="row">

    <div class="col-md-6 mb-3">
      <label>Paciente</label>
      <select id="paciente_id" class="form-control"></select>
    </div>

    <div class="col-md-6 mb-3">
      <label>Doctor</label>
      <select id="doctor_id" class="form-control"></select>
    </div>

    <div class="col-md-6 mb-3">
      <label>Fecha</label>
      <input type="date" id="fecha" class="form-control">
    </div>

    <div class="col-md-6 mb-3">
      <label>Estado</label>
      <select id="estado" class="form-control">
        <option value="pendiente">Pendiente</option>
        <option value="confirmada">Confirmada</option>
        <option value="cancelada">Cancelada</option>
      </select>
    </div>

    <div class="col-md-12 mb-3">
      <label>Diagnóstico</label>
      <input type="text" id="diagnostico" class="form-control">
    </div>

    <div class="col-md-12 mb-3">
      <label>Notas</label>
      <textarea id="notas" class="form-control"></textarea>
    </div>

  </div>

  <button type="submit" class="btn btn-primary">Actualizar</button>
  <a href="consultas.html" class="btn btn-secondary">Cancelar</a>

</form>

<script>
$(document).ready(function () {

  const params = new URLSearchParams(window.location.search);
  const id = params.get("id");

  if (!id) {
    alert("ID no proporcionado");
    window.location.href = "consultas.html";
    return;
  }

  // Cargar pacientes
  $.get("http://localhost:3000/api/pacientes", function (data) {
    data.forEach(p => {
      $("#paciente_id").append(
        `<option value="${p._id}">${p.nombre} ${p.apellido}</option>`
      );
    });
  });

  // Cargar doctores
  $.get("http://localhost:3000/api/doctores", function (data) {
    data.forEach(d => {
      $("#doctor_id").append(
        `<option value="${d._id}">${d.nombre} (${d.especialidad})</option>`
      );
    });
  });

  // Cargar consulta
  $.ajax({
    url: "http://localhost:3000/api/consultas/" + id,
    type: "GET",
    success: function (c) {

      $("#fecha").val(c.fecha.split("T")[0]);
      $("#diagnostico").val(c.diagnostico);
      $("#notas").val(c.notas);
      $("#estado").val(c.estado);

      // esperar a que carguen selects
      setTimeout(() => {
        $("#paciente_id").val(c.paciente_id);
        $("#doctor_id").val(c.doctor_id?._id || c.doctor_id);
      }, 300);

    },
    error: function () {
      alert("Error al cargar consulta");
    }
  });

  // Enviar actualización
  $("#formConsulta").submit(function (e) {
    e.preventDefault();

    let datos = {
      paciente_id: $("#paciente_id").val(),
      doctor_id: $("#doctor_id").val(),
      fecha: $("#fecha").val(),
      diagnostico: $("#diagnostico").val(),
      notas: $("#notas").val(),
      estado: $("#estado").val()
    };

    $.ajax({
      url: "http://localhost:3000/api/consultas/" + id,
      type: "PUT",
      data: JSON.stringify(datos),
      contentType: "application/json",
      success: function () {
        alert("Consulta actualizada");
        window.location.href = "consultas.html";
      },
      error: function () {
        alert("Error al actualizar consulta");
      }
    });

  });

});
</script>

</body>
</html>
