<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Catálogo de Síntomas</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
</head>

<body class="container mt-4">

<h1 class="text-center">Catálogo de Síntomas</h1>

<table class="table table-striped mt-4">
<thead class="table-dark">
<tr>
  <th>ID</th>
  <th>Nombre</th>
  <th>Etiqueta</th>
  <th>Tipo</th>
  <th>Escala</th>
  <th>Umbral</th>
  <th>Acciones</th>
</tr>
</thead>

<tbody id="tabla"></tbody>
</table>

<script>
$(document).ready(function(){

  listar();

  function listar(){
    $.get("http://localhost:3000/api/CatalogoSintomas", function(data){

      let t = $("#tabla");
      t.empty();

      data.forEach(s => {

        let escala = (s.tipo === "escala") 
          ? `${s.escalaMinima}-${s.escalaMaxima}`
          : "-";

        t.append(`
          <tr>
            <td>${s.id_}</td>
            <td>${s.nombre}</td>
            <td>${s.etiqueta}</td>
            <td>${s.tipo}</td>
            <td>${escala}</td>
            <td>${s.umbralAlerta || "-"}</td>
            <td>
              <button class="btn btn-warning btn-sm"onclick="window.location.href='edit.html?id=${s.id_}'">Editar</button>
              <button class="btn btn-danger btn-sm"onclick="eliminar('${s._id}')">Eliminar</button>
            </td>
          </tr>
        `);

      });

    });
  }

  window.eliminar = function(id){
    $.ajax({
      url: "http://localhost:3000/api/CatalogoSintomas/" + id,
      type: "DELETE",
      success: listar
    });
  }

});
</script>

<div class="row mt-5">
  <div class="col-md-4">
    <div class="card text-center shadow">
      <div class="card-body">
        <h5>Catálogo</h5>
        <p>Agregar síntoma</p>
        <a href="create.html" class="btn btn-primary">Insertar</a>
      </div>
    </div>
  </div>
</div>

</body>
</html>
