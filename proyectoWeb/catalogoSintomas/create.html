<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Crear Síntoma</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
</head>

<body class="container mt-4">

<h1 class="text-center">Registrar Síntoma</h1>

<form id="formSintoma">

<div class="row">

  <div class="col-md-6 mb-3">
    <label>ID</label>
    <input type="number" id="id_" class="form-control" required>
  </div>

  <div class="col-md-6 mb-3">
    <label>Nombre (interno)</label>
    <input type="text" id="nombre" class="form-control" required>
  </div>

  <div class="col-md-6 mb-3">
    <label>Etiqueta</label>
    <input type="text" id="etiqueta" class="form-control" required>
  </div>

  <div class="col-md-6 mb-3">
    <label>Tipo</label>
    <select id="tipo" class="form-control">
      <option value="escala">Escala</option>
      <option value="booleano">Booleano</option>
      <option value="texto">Texto</option>
    </select>
  </div>

  <div class="col-md-6 mb-3">
    <label>Escala mínima</label>
    <input type="number" id="min" class="form-control">
  </div>

  <div class="col-md-6 mb-3">
    <label>Escala máxima</label>
    <input type="number" id="max" class="form-control">
  </div>

  <div class="col-md-12 mb-3">
    <label>Condiciones relacionadas (coma)</label>
    <input type="text" id="condiciones" class="form-control">
  </div>

  <div class="col-md-6 mb-3">
    <label>Umbral alerta</label>
    <input type="number" id="umbral" class="form-control">
  </div>

</div>

<button class="btn btn-primary">Guardar</button>

</form>

<script>
$("#formSintoma").submit(function(e){
  e.preventDefault();

  let tipo = $("#tipo").val();

  let datos = {
    id_: parseInt($("#id_").val()),
    nombre: $("#nombre").val(),
    etiqueta: $("#etiqueta").val(),
    tipo: tipo,
    condicionesRelacionadas: $("#condiciones").val().split(","),
    umbralAlerta: parseInt($("#umbral").val())
  };

  if(tipo === "escala"){
    datos.escalaMinima = parseInt($("#min").val());
    datos.escalaMaxima = parseInt($("#max").val());
  }

  $.ajax({
    url: "http://localhost:3000/api/CatalogoSintomas",
    type: "POST",
    data: JSON.stringify(datos),
    contentType: "application/json",
    success: function(){
      alert("Síntoma creado");
      $("#formSintoma")[0].reset();
    }
  });
});
</script>

</body>
</html>
