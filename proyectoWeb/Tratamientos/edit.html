<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Editar Tratamiento</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
  </head>

  <body class="container mt-4">
    <h1 class="text-center">Editar Tratamiento</h1>

    <form id="formTratamiento">
      <div class="row">
        <div class="col-md-4 mb-3">
          <label>Consulta</label>
          <select id="consulta_id" class="form-control" required></select>
        </div>

        <div class="col-md-4 mb-3">
          <label>Paciente</label>
          <select id="paciente_id" class="form-control" required></select>
        </div>

        <div class="col-md-4 mb-3">
          <label>Doctor</label>
          <select id="doctor_id" class="form-control" required></select>
        </div>

        <div class="col-md-6 mb-3">
          <label>Fecha Inicio</label>
          <input type="date" id="fecha_inicio" class="form-control" required />
        </div>

        <div class="col-md-6 mb-3">
          <label>Fecha Fin</label>
          <input type="date" id="fecha_fin" class="form-control" required />
        </div>

        <div class="col-md-12 mb-3">
          <label>Instrucciones</label>
          <textarea id="instrucciones" class="form-control" required></textarea>
        </div>

        <div class="col-md-4 mb-3">
          <label>Medicamento</label>
          <select id="medicamento_id" class="form-control"></select>
        </div>

        <div class="col-md-4 mb-3">
          <label>Dosis</label>
          <input type="text" id="dosis" class="form-control" placeholder="500 mg" />
        </div>

        <div class="col-md-4 mb-3">
          <label>Frecuencia</label>
          <input type="text" id="frecuencia" class="form-control" placeholder="Cada 8 horas" />
        </div>
      </div>

      <button type="submit" class="btn btn-primary">Actualizar</button>
      <a href="tratamientos.html" class="btn btn-secondary">Cancelar</a>
    </form>

    <script>
      $(document).ready(function () {
        const params = new URLSearchParams(window.location.search);
        const id = params.get("id");

        if (!id) {
          alert("ID no proporcionado");
          window.location.href = "tratamientos.html";
          return;
        }

        $.when(
          cargarPacientes(),
          cargarDoctores(),
          cargarConsultas(),
          cargarMedicamentos(),
        ).done(function () {
          cargarTratamiento();
        });

        function cargarPacientes() {
          return $.get("http://localhost:3000/api/pacientes", function (data) {
            let select = $("#paciente_id");
            select.empty();
            select.append('<option value="">Seleccione paciente</option>');

            data.forEach((p) => {
              select.append(
                `<option value="${p._id}">
                ${p.nombre} ${p.apellido}
              </option>`,
              );
            });
          });
        }

        function cargarDoctores() {
          return $.get("http://localhost:3000/api/doctores", function (data) {
            let select = $("#doctor_id");
            select.empty();
            select.append('<option value="">Seleccione doctor</option>');

            data.forEach((d) => {
              select.append(
                `<option value="${d._id}">
                ${d.nombre} (${d.especialidad})
              </option>`,
              );
            });
          });
        }

        function cargarConsultas() {
          return $.get("http://localhost:3000/api/consultas", function (data) {
            let select = $("#consulta_id");
            select.empty();
            select.append('<option value="">Seleccione consulta</option>');

            data.forEach((c) => {
              select.append(
                `<option value="${c._id}">
                ${c.diagnostico}
              </option>`,
              );
            });
          });
        }

        function cargarMedicamentos() {
          return $.get("http://localhost:3000/api/medicamentos", function (data) {
            let select = $("#medicamento_id");
            select.empty();
            select.append('<option value="">Seleccione medicamento</option>');

            data.forEach((m) => {
              select.append(
                `<option value="${m._id}">
                ${m.nombre} (${m.categoria})
              </option>`,
              );
            });
          });
        }

        function cargarTratamiento() {
          $.ajax({
            url: "http://localhost:3000/api/tratamientos/" + id,
            type: "GET",
            success: function (t) {
              $("#consulta_id").val(t.consulta_id?._id || t.consulta_id || "");
              $("#paciente_id").val(t.paciente_id?._id || t.paciente_id || "");
              $("#doctor_id").val(t.doctor_id?._id || t.doctor_id || "");
              $("#fecha_inicio").val(t.fecha_inicio?.split("T")[0] || "");
              $("#fecha_fin").val(t.fecha_fin?.split("T")[0] || "");
              $("#instrucciones").val(t.instrucciones || "");

              const medicamento = (t.medicamentos || [])[0];
              if (medicamento) {
                $("#medicamento_id").val(
                  medicamento.medicamento_id?._id || medicamento.medicamento_id || "",
                );
                $("#dosis").val(medicamento.dosis || "");
                $("#frecuencia").val(medicamento.frecuencia || "");
              }
            },
            error: function () {
              alert("Error al cargar tratamiento");
              window.location.href = "tratamientos.html";
            },
          });
        }

        $("#formTratamiento").submit(function (e) {
          e.preventDefault();

          let medicamentos = [];

          const medicamentoId = $("#medicamento_id").val();
          const dosis = $("#dosis").val().trim();
          const frecuencia = $("#frecuencia").val().trim();

          if (medicamentoId || dosis || frecuencia) {
            if (!medicamentoId || !dosis || !frecuencia) {
              alert("Si agregas medicamento, debes completar medicamento, dosis y frecuencia.");
              return;
            }

            medicamentos.push({
              medicamento_id: medicamentoId,
              dosis: dosis,
              frecuencia: frecuencia,
            });
          }

          let datos = {
            consulta_id: $("#consulta_id").val(),
            paciente_id: $("#paciente_id").val(),
            doctor_id: $("#doctor_id").val(),
            fecha_inicio: $("#fecha_inicio").val(),
            fecha_fin: $("#fecha_fin").val(),
            instrucciones: $("#instrucciones").val(),
            medicamentos: medicamentos,
          };

          $.ajax({
            type: "PUT",
            url: "http://localhost:3000/api/tratamientos/" + id,
            data: JSON.stringify(datos),
            contentType: "application/json",
            success: function () {
              alert("Tratamiento actualizado correctamente");
              window.location.href = "tratamientos.html";
            },
            error: function (xhr) {
              const mensaje =
                xhr.responseJSON?.detalle ||
                xhr.responseJSON?.mensaje ||
                "Error al actualizar tratamiento";
              alert(mensaje);
            },
          });
        });
      });
    </script>
  </body>
</html>
