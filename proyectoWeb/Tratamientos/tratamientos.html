<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Tratamientos</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
</head>

<body class="container mt-4">

<h1 class="text-center">Lista de Tratamientos</h1>

<table class="table table-striped mt-4">
  <thead class="table-dark">
    <tr>
      <th>Consulta</th>
      <th>Paciente</th>
      <th>Doctor</th>
      <th>Fechas</th>
      <th>Instrucciones</th>
      <th>Medicamentos</th>
      <th>Acciones</th>
    </tr>
  </thead>
  <tbody id="tablaTratamientos"></tbody>
</table>

<script>
$(document).ready(function () {

  listar();

  function listar() {
    $.ajax({
      url: "http://localhost:3000/api/tratamientos",
      type: "GET",
      success: function (data) {

        console.log("DATOS:", data);

        let tabla = $("#tablaTratamientos");
        tabla.empty();

        if (!data || data.length === 0) {
          tabla.append("<tr><td colspan='7'>No hay datos</td></tr>");
          return;
        }

        data.forEach(t => {

          let inicio = t.fecha_inicio 
            ? new Date(t.fecha_inicio).toLocaleDateString() 
            : "N/A";

          let fin = t.fecha_fin 
            ? new Date(t.fecha_fin).toLocaleDateString() 
            : "N/A";

         
          let meds = (t.medicamentos || []).map(m => {
            return `
              ${m.medicamento_id?.nombre || m.medicamento_id || "N/A"}
              (${m.dosis || ""} - ${m.frecuencia || ""})
            `;
          }).join("<br>");

          let fila = `
          <tr>
            <td>${t.consulta_id?._id || t.consulta_id || "N/A"}</td>
            <td>${t.paciente_id?.nombre || "N/A"}</td>
            <td>${t.doctor_id?.nombre || "N/A"}</td>
            <td>${inicio} - ${fin}</td>
            <td>${t.instrucciones || ""}</td>
            <td>${meds || "Sin medicamentos"}</td>
            <td>
              <button class="btn btn-warning btn-sm" onclick="window.location.href='edit.html?id=${t._id}'">Editar</button>
              <button class="btn btn-danger btn-sm" onclick="eliminar('${t._id}')">Eliminar</button>
            </td>
          </tr>`;

          tabla.append(fila);
        });

      },
      error: function (err) {
        console.error(err);
        alert("Error al cargar tratamientos");
      }
    });
  }

  window.eliminar = function(id) {
    if (!confirm("¿Eliminar tratamiento?")) return;

    $.ajax({
      url: "http://localhost:3000/api/tratamientos/" + id,
      type: "DELETE",
      success: function () {
        listar();
      },
      error: function () {
        alert("Error al eliminar");
      }
    });
  }

});
</script>

<div class="mt-4">
  <a href="create.html" class="btn btn-primary">Nuevo Tratamiento</a>
</div>

</body>
</html>
