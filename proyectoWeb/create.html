<!doctype html>
<html lang="en">
  <head>
    <title>Crear</title>
    <!-- Required meta tags -->
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no"
    />

    <!-- Bootstrap CSS v5.2.1 -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN"
      crossorigin="anonymous"
    />
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
  </head>

  <body>
    <header>
      <!-- place navbar here -->
      <nav class="nav justify-content-center">
        <a class="nav-link active" href="#" aria-current="page">Active link</a>
        <a class="nav-link" href="#">Link</a>
        <a class="nav-link disabled" href="#">Disabled link</a>
      </nav>
    </header>
    <main>
      <h1>Lista de Cursos</h1>
      <form id="formularioCurso">
        <div class="mb-3">
          <label for="" class="form-label">nombre</label>
          <input
            type="text"
            class="form-control"
            name="nombre"
            id="nombre"
            aria-describedby="helpId"
            placeholder=""
            required
          />
          <small id="helpId" class="form-text text-muted">Help text</small>
        </div>

        <div class="mb-3">
          <label for="" class="form-label">descripcion</label>
          <input
            type="text"
            class="form-control"
            name="descripcion"
            id="descripcion"
            aria-describedby="helpId"
            placeholder=""
            required
          />
          <small id="helpId" class="form-text text-muted">Help text</small>
        </div>

        <div class="mb-3">
          <label for="" class="form-label">usuario</label>
          <input
            type="text"
            class="form-control"
            name="usuario"
            id="usuario"
            aria-describedby="helpId"
            placeholder=""
            required
          />
          <small id="helpId" class="form-text text-muted">Help text</small>
        </div>

        <button type="submit" class="btn btn-primary">Guardar</button>

        <button type="reset" class="btn btn-danger">Reset</button>
      </form>
    </main>
    <footer>
      <!-- place footer here -->
    </footer>
    <!-- Bootstrap JavaScript Libraries -->
    <script
      src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
      integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
      crossorigin="anonymous"
    ></script>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.min.js"
      integrity="sha384-BBtl+eGJRgqQAUMxJ7pMwbEyER4l1g+O15P+16Ep7Q9Q+zqX6gSbd85u4mG4QzX+"
      crossorigin="anonymous"
    ></script>

    <script>
      $(document).ready(function () {
        $("#formularioCurso").submit(function (e) {
          e.preventDefault();

          let objetodatos = {
            nombre: $("#nombre").val(),
            descripcion: $("#descripcion").val(),
            tiempo: "Sin tiempo",
            usuario: $("#usuario").val(),
          };

          console.log(objetodatos);

          $.ajax({
            type: "POST",
            url: "https://paginas-web-cr.com/Api/apis/InsertarCursos.php",
            data: JSON.stringify(objetodatos),
            dataType: "json",
            success: function (response) {
              console.log(response);
              alert("almcenando datos");
            },
            error: function (error) {
              alert("Error al guardar los datos");
            },
          });
        });
      });
    </script>
  </body>
</html>
