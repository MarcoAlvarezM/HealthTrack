<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Sistema Médico</title>
  <link href="./css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-4">

  <h1 class="text-center">Sistema de Gestión</h1>

  <!-- NAV -->
  <div class="d-flex justify-content-center gap-3 mt-4">
    <a href="usuarios.html" class="btn btn-primary">Usuarios</a>
    <a href="pacientes.html" class="btn btn-success">Pacientes</a>
    <a href="doctores.html" class="btn btn-warning">Doctores</a>
  </div>

  <!-- TABLA GENERAL -->
  <h2 class="mt-5">Resumen de Usuarios</h2>

  <table class="table">
    <thead>
      <tr>
        <th>Correo</th>
        <th>Rol</th>
      </tr>
    </thead>
    <tbody id="tablaUsuarios"></tbody>
  </table>

  <script type="module">
    import { getData } from "./js/app.js";

    async function cargarUsuarios() {
      const data = await getData("usuarios");

      const tabla = document.getElementById("tablaUsuarios");
      tabla.innerHTML = "";

      data.forEach(u => {
        tabla.innerHTML += `
          <tr>
            <td>${u.correo}</td>
            <td>${u.role}</td>
          </tr>
        `;
      });
    }

    cargarUsuarios();
  </script>

</body>
</html>
