<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Doctores</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
</head>

<body class="container mt-4">

<h1 class="text-center">Lista de Doctores</h1>

<table class="table table-striped mt-4">
  <thead class="table-dark">
    <tr>
      <th>Nombre</th>
      <th>Especialidad</th>
      <th>Teléfono</th>
      <th>Horario</th>
      <th>Acciones</th>
    </tr>
  </thead>
  <tbody id="tablaDoctores"></tbody>
</table>

<script>
$(document).ready(function () {
  listar();

  function listar() {
    $.get("http://localhost:3000/api/doctores", function (data) {
      let tabla = $("#tablaDoctores");
      tabla.empty();

      data.forEach(d => {

        let horarios = d.horarioDisponible.map(h =>
          `${h.dia} ${h.horaInicio}-${h.horaFin}`
        ).join("<br>");

        tabla.append(`
          <tr>
            <td>${d.nombre} ${d.apellidos}</td>
            <td>${d.especialidad}</td>
            <td>${d.telefono}</td>
            <td>${horarios}</td>
            <td>
              <button class="btn btn-warning btn-sm"onclick="window.location.href='edit.html?id=${d._id}'">Editar</button> 
              <button class="btn btn-danger btn-sm" onclick="eliminar('${d._id}')">Eliminar</button>
            </td>
          </tr>
        `);
      });
    });
  }

  window.eliminar = function(id) {

    if (!confirm("¿Seguro que deseas eliminar este doctor?")) return;

    $.ajax({
      url: "http://localhost:3000/api/doctores/" + id,
      type: "DELETE",
      success: listar
    });
  }
});
</script>

<div class="row mt-5">

  <!-- DOCTORES -->
  <div class="col-md-4">
    <div class="card text-center shadow">
      <div class="card-body">
        <h5 class="card-title">Doctores</h5>
        <p class="card-text">Agregar doctores</p>
        <a href="create.html" class="btn btn-primary">Insertar</a>
      </div>
    </div>
  </div>

</div>


</body>
</html>
