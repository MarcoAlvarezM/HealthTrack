<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Editar Doctor</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
</head>

<body class="container mt-4">

<h1 class="text-center">Editar Doctor</h1>

<form id="formDoctor">

  <div class="row">

    <div class="col-md-6 mb-3">
      <label>Nombre</label>
      <input type="text" id="nombre" class="form-control">
    </div>

    <div class="col-md-6 mb-3">
      <label>Apellidos</label>
      <input type="text" id="apellidos" class="form-control">
    </div>

    <div class="col-md-6 mb-3">
      <label>Especialidad</label>
      <input type="text" id="especialidad" class="form-control">
    </div>

    <div class="col-md-6 mb-3">
      <label>Teléfono</label>
      <input type="text" id="telefono" class="form-control">
    </div>

  </div>

  <button type="submit" class="btn btn-primary">Actualizar</button>
  <a href="doctores.html" class="btn btn-secondary">Cancelar</a>

</form>

<script>
$(document).ready(function () {

  // Obtener ID desde URL
  const params = new URLSearchParams(window.location.search);
  const id = params.get("id");

  if (!id) {
    alert("ID no proporcionado");
    window.location.href = "doctores.html";
    return;
  }

  // Cargar datos del doctor
  $.ajax({
    url: "http://localhost:3000/api/doctores/" + id,
    type: "GET",
    success: function (d) {
      $("#nombre").val(d.nombre);
      $("#apellidos").val(d.apellidos);
      $("#especialidad").val(d.especialidad);
      $("#telefono").val(d.telefono);
    },
    error: function () {
      alert("Error al cargar doctor");
    }
  });

  // Enviar cambios
  $("#formDoctor").submit(function (e) {
    e.preventDefault();

    let datos = {};

    let nombre = $("#nombre").val();
    let apellidos = $("#apellidos").val();
    let especialidad = $("#especialidad").val();
    let telefono = $("#telefono").val();

    if (nombre) datos.nombre = nombre;
    if (apellidos) datos.apellidos = apellidos;
    if (especialidad) datos.especialidad = especialidad;
    if (telefono) datos.telefono = telefono;

    // Validacion
    if (Object.keys(datos).length === 0) {
      alert("No hay cambios para actualizar");
      return;
    }

    $.ajax({
      url: "http://localhost:3000/api/doctores/" + id,
      type: "PUT",
      data: JSON.stringify(datos),
      contentType: "application/json",
      success: function () {
        alert("Doctor actualizado correctamente");
        window.location.href = "doctores.html";
      },
      error: function () {
        alert("Error al actualizar");
      }
    });

  });

});
</script>

</body>
</html>
