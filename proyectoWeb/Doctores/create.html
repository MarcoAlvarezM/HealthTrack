<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Crear Doctor</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
</head>

<body class="container mt-4">

<h1 class="text-center">Registrar Doctor</h1>

<form id="formDoctor">

  <div class="row">

    <div class="col-md-6 mb-3">
      <label>Usuario ID</label>
      <select id="usuario_id" class="form-control" required></select>
    </div>

    <div class="col-md-6 mb-3">
      <label>Nombre</label>
      <input type="text" id="nombre" class="form-control" required>
    </div>

    <div class="col-md-6 mb-3">
      <label>Apellidos</label>
      <input type="text" id="apellidos" class="form-control" required>
    </div>

    <div class="col-md-6 mb-3">
      <label>Especialidad</label>
      <input type="text" id="especialidad" class="form-control" required>
    </div>

    <div class="col-md-6 mb-3">
      <label>Teléfono</label>
      <input type="text" id="telefono" class="form-control" required>
    </div>

    <!-- HORARIO -->
    <div class="col-md-12">
      <h5>Horario</h5>
      <div id="horarios"></div>
      <button type="button" class="btn btn-secondary btn-sm" id="agregarHorario">Agregar horario</button>
    </div>

  </div>

  <button type="submit" class="btn btn-primary mt-3">Guardar</button>

</form>

<script>
$(document).ready(function () {

  // Cargar usuarios
  $.get("http://localhost:3000/api/usuarios", function (usuarios) {
    usuarios.forEach(u => {
      $("#usuario_id").append(`<option value="${u._id}">${u.correo}</option>`);
    });
  });

  // Agregar horarios dinámicamente
  $("#agregarHorario").click(function () {
    $("#horarios").append(`
      <div class="row mt-2">
        <div class="col-md-4">
          <input type="text" placeholder="Día" class="form-control dia">
        </div>
        <div class="col-md-4">
          <input type="time" class="form-control inicio">
        </div>
        <div class="col-md-4">
          <input type="time" class="form-control fin">
        </div>
      </div>
    `);
  });

  // Enviar formulario
  $("#formDoctor").submit(function (e) {
    e.preventDefault();

    let horarios = [];

    $("#horarios .row").each(function () {
      horarios.push({
        dia: $(this).find(".dia").val(),
        horaInicio: $(this).find(".inicio").val(),
        horaFin: $(this).find(".fin").val()
      });
    });

    let datos = {
      usuario_id: $("#usuario_id").val(),
      nombre: $("#nombre").val(),
      apellidos: $("#apellidos").val(),
      especialidad: $("#especialidad").val(),
      telefono: $("#telefono").val(),
      horarioDisponible: horarios
    };

    $.ajax({
      type: "POST",
      url: "http://localhost:3000/api/doctores",
      data: JSON.stringify(datos),
      contentType: "application/json",
      success: function (response) {
         console.log(response);
        alert("Doctor guardado");
        $("#formDoctor")[0].reset();
        $("#horarios").empty();
      },
      error: function () {
        alert("Error al guardar");
      }
    });

  });

});
</script>

</body>
</html>
