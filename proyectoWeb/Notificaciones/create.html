<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Crear Notificación</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
</head>

<body class="container mt-4">

<h1 class="text-center">Lista Notificación</h1>

<form id="formNotificacion">

  <div class="row">

    <div class="col-md-6 mb-3">
      <label>Usuario</label>
      <select id="usuario_id" class="form-control" required></select>
    </div>

    <div class="col-md-6 mb-3">
      <label>Alerta</label>
      <select id="alerta_id" class="form-control" required></select>
    </div>

    <div class="col-md-12 mb-3">
      <label>Mensaje</label>
      <textarea id="mensaje" class="form-control" required></textarea>
    </div>

    <div class="col-md-6 mb-3">
      <label>Leído</label>
      <select id="leido" class="form-control">
        <option value="false">No</option>
        <option value="true">Sí</option>
      </select>
    </div>

  </div>

  <button type="submit" class="btn btn-primary">Guardar</button>

</form>

<script>
$(document).ready(function () {

 
  $.get("http://localhost:3000/api/usuarios", function (usuarios) {
    usuarios.forEach(u => {
      $("#usuario_id").append(`<option value="${u._id}">${u.correo}</option>`);
    });
  });

  
  $.get("http://localhost:3000/api/alertas", function (alertas) {
    alertas.forEach(a => {
      $("#alerta_id").append(`<option value="${a._id}">${a.nombre}</option>`);
    });
  });


  $("#formNotificacion").submit(function (e) {
    e.preventDefault();

    let datos = {
      usuario_id: $("#usuario_id").val(),
      alerta_id: $("#alerta_id").val(),
      mensaje: $("#mensaje").val(),
      leido: $("#leido").val() === "true"
    };

    $.ajax({
      type: "POST",
      url: "http://localhost:3000/api/notificaciones",
      data: JSON.stringify(datos),
      contentType: "application/json",
      success: function (response) {
        console.log(response);
        alert("Notificación guardada correctamente");

        $("#formNotificacion")[0].reset();
      },
      error: function (err) {
        console.error(err);
        alert("Error al guardar la notificación");
      }
    });

  });

});
</script>

</body>
</html>
