<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Editar Notificación</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
</head>

<body class="container mt-4">

<h1 class="text-center">Editar Notificación</h1>

<form id="formNotificacion">

  <div class="row">

    <div class="col-md-6 mb-3">
      <label>Usuario</label>
      <select id="usuario_id" class="form-control" required></select>
    </div>

    <div class="col-md-6 mb-3">
      <label>Alerta</label>
      <select id="alerta_id" class="form-control" required></select>
    </div>

    <div class="col-md-12 mb-3">
      <label>Mensaje</label>
      <textarea id="mensaje" class="form-control" required></textarea>
    </div>

    <div class="col-md-6 mb-3">
      <label>Leído</label>
      <select id="leido" class="form-control">
        <option value="false">No</option>
        <option value="true">Sí</option>
      </select>
    </div>

  </div>

  <button type="submit" class="btn btn-primary">Actualizar</button>
  <a href="notificaciones.html" class="btn btn-secondary">Cancelar</a>

</form>

<script>
$(document).ready(function () {
  const params = new URLSearchParams(window.location.search);
  const id = params.get("id");

  if (!id) {
    alert("ID no proporcionado");
    window.location.href = "notificaciones.html";
    return;
  }

  // Cargar usuarios en select
  $.get("http://localhost:3000/api/usuarios", function (usuarios) {
    console.log("Usuarios cargados:", usuarios);
    usuarios.forEach(u => {
      $("#usuario_id").append(`<option value="${u._id}">${u.correo}</option>`);
    });

    // Cargar alertas en select
    $.get("http://localhost:3000/api/alertas", function (alertas) {
      console.log("Alertas cargadas:", alertas);
      alertas.forEach(a => {
        const paciente = a.paciente_id?.nombre || "Paciente";
        const regla = a.regla_id?.nombre || "Sin regla";
        const severidad = a.severidad || "sin severidad";
        const mensaje = a.mensaje || "Sin mensaje";
        $("#alerta_id").append(
          `<option value="${a._id}">${paciente} - ${regla} [${severidad}] - ${mensaje}</option>`,
        );
      });

      // Ahora cargar la notificación a editar
      $.ajax({
        url: "http://localhost:3000/api/notificaciones/" + id,
        type: "GET",
        success: function (notificacion) {
          console.log("Notificación cargada:", notificacion);
          $("#usuario_id").val(notificacion.usuario_id._id);
          $("#alerta_id").val(notificacion.alerta_id._id);
          $("#mensaje").val(notificacion.mensaje);
          $("#leido").val(notificacion.leido ? "true" : "false");
        },
        error: function (error) {
          console.error("Error al obtener la notificación:", error);
          alert("Error al cargar la notificación");
          window.location.href = "notificaciones.html";
        }
      });
    }).fail(function (error) {
      console.error("Error al cargar alertas:", error);
      alert("Error al cargar alertas");
    });
  }).fail(function (error) {
    console.error("Error al cargar usuarios:", error);
    alert("Error al cargar usuarios");
  });

  // Enviar actualización
  $("#formNotificacion").submit(function (e) {
    e.preventDefault();

    let datos = {
      usuario_id: $("#usuario_id").val(),
      alerta_id: $("#alerta_id").val(),
      mensaje: $("#mensaje").val(),
      leido: $("#leido").val() === "true"
    };

    $.ajax({
      type: "PUT",
      url: "http://localhost:3000/api/notificaciones/" + id,
      data: JSON.stringify(datos),
      contentType: "application/json",
      success: function (response) {
        console.log("Notificación actualizada:", response);
        alert("Notificación actualizada correctamente");
        setTimeout(() => {
          window.location.href = "notificaciones.html";
        }, 500);
      },
      error: function (err) {
        console.error("Error al actualizar:", err);
        alert("Error al actualizar la notificación");
      }
    });
  });

});
</script>

</body>
</html>
