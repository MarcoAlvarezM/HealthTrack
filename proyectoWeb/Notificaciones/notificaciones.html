<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Notificaciones</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
</head>

<body class="container mt-4">

<h1 class="text-center">Lista Notificación</h1>

  
  <table class="table mt-4">
    <thead>
      <tr>
        <th>Usuario</th>
        <th>Alerta</th>
        <th>Mensaje</th>
        <th>Leído</th>
        <th>Fecha</th>
        <th>Acciones</th>
      </tr>
    </thead>
    <tbody id="tabla"></tbody>
  </table>

  <script>$(document).ready(function () {

  listar();

  function listar() {
    $.ajax({
      url: "http://localhost:3000/api/notificaciones",
      type: "GET",
      success: function (data) {
        console.log("Notificaciones cargadas:", data);
        let tabla = $("#tabla");
        tabla.empty();

        if (data.length === 0) {
          tabla.append("<tr><td colspan='7'>No hay datos</td></tr>");
          return;
        }

        data.forEach(n => {
          console.log("Procesando notificación:", n);
          let fila = `<tr>
            <td>${n.usuario_id?.correo || "Usuario desconocido"}</td>
            <td>${n.alerta_id ? `${n.alerta_id.regla_id?.nombre || "Sin regla"} [${n.alerta_id.severidad || "sin severidad"}]` : "Alerta desconocida"}</td>
            <td>${n.mensaje}</td>
            <td>${n.leido ? "Sí" : "No"}</td>
            <td>${new Date(n.enviado).toLocaleString()}</td>
            <td>
              <a href="edit.html?id=${n._id}" class="btn btn-warning btn-sm">Editar</a>
              <button class="btn btn-danger btn-sm" onclick="eliminar('${n._id}')">Eliminar</button>
            </td>
          </tr>`;

          tabla.append(fila);
        });
      },
      error: function (error) {
        console.error("Error al cargar notificaciones:", error);
      }
    });
  }

window.eliminar = function(id) {
        $.ajax({
          url: "http://localhost:3000/api/notificaciones/" + id,
          type: "DELETE",
          success: function () {
            listar();
          }
        });
      }
});</script>
<div class="row mt-5">

    <!-- USUARIOS -->
    <div class="col-md-4">
      <div class="card text-center shadow">
        <div class="card-body">
          <h5 class="card-title">Notificaciones</h5>
          <p class="card-text">Agregar notificaciones</p>
          <a href="create.html" class="btn btn-primary">Insertar</a>
        </div>
      </div>
    </div>
</body>
</html>
</body>
</html>
