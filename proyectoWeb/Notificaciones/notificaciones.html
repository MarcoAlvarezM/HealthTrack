<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Notificaciones</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
</head>

<body class="container mt-4">

<h1 class="text-center">Lista Notificación</h1>

  
  <table class="table mt-4">
    <thead>
      <tr>
        <th>Usuario</th>
        <th>Alerta</th>
        <th>Mensaje</th>
        <th>Leído</th>
        <th>Fecha</th>
        <th>Acciones</th>
      </tr>
    </thead>
    <tbody id="tabla"></tbody>
  </table>

  <script>$(document).ready(function () {

  listar();

  
  $.get("http://localhost:3000/api/usuarios", function (usuarios) {
    usuarios.forEach(u => {
      $("#usuario_id").append(`<option value="${u._id}">${u.correo}</option>`);
    });
  });

  
  $.get("http://localhost:3000/api/alertas", function (alertas) {
    alertas.forEach(a => {
      $("#alerta_id").append(`<option value="${a._id}">${a.nombre}</option>`);
    });
  });

  
  function listar() {
    $.ajax({
      url: "http://localhost:3000/api/notificaciones",
      type: "GET",
      success: function (data) {
        let tabla = $("#tabla");
        tabla.empty();

        if (data.length === 0) {
          tabla.append("<tr><td colspan='6'>No hay datos</td></tr>");
          return;
        }

        data.forEach(n => {
          let fila = `<tr>
            <td>${n.usuario_id?.correo || ""}</td>
            <td>${n.alerta_id?.nombre || ""}</td>
            <td>${n.mensaje}</td>
            <td>${n.leido ? "Sí" : "No"}</td>
            <td>${new Date(n.enviado).toLocaleString()}</td>
            <td>
              <button class="btn btn-danger btn-sm" onclick="eliminar('${n._id}')">Eliminar</button>
            </td>
          </tr>`;

          tabla.append(fila);
        });
      },
      error: function () {
        alert("Error al cargar notificaciones");
      }
    });
  }
cargarNotificaciones();

window.eliminar = function(id) {
        $.ajax({
          url: "http://localhost:3000/api/notificaciones/" + id,
          type: "DELETE",
          success: function () {
            listarNotificaciones();
          }
        });
      }
});</script>
<div class="row mt-5">

    <!-- USUARIOS -->
    <div class="col-md-4">
      <div class="card text-center shadow">
        <div class="card-body">
          <h5 class="card-title">Notificaciones</h5>
          <p class="card-text">Agregar notificaciones</p>
          <a href="create.html" class="btn btn-primary">Insertar</a>
        </div>
      </div>
    </div>
</body>
</html>
</body>
</html>
