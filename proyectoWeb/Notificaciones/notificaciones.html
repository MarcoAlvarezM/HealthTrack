<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Notificaciones</title>
  <link href="./css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-4">

  <h2>Gestión de Notificaciones</h2>

  <!-- FORMULARIO -->
  <form id="formulario" class="mt-3">
    <input type="hidden" id="id">

    <div class="row mb-2">
      <div class="col">
        <label>ID Paciente</label>
        <input type="text" id="pacienteId" class="form-control" placeholder="ObjectId del paciente" required>
      </div>
      <div class="col">
        <label>ID Doctor </label>
        <input type="text" id="doctorId" class="form-control" placeholder="ObjectId del doctor">
      </div>
    </div>

    <div class="mb-2">
      <label>Título</label>
      <input type="text" id="titulo" class="form-control" placeholder="Ej: Alerta de fiebre alta" required>
    </div>

    <div class="mb-2">
      <label>Mensaje</label>
      <textarea id="mensaje" class="form-control" rows="2" placeholder="Descripción de la notificación" required></textarea>
    </div>

    <div class="row mb-2">
      <div class="col">
        <label>Tipo</label>
        <select id="tipo" class="form-control">
          <option value="alerta">Alerta</option>
          <option value="recordatorio">Recordatorio</option>
          <option value="informacion">Información</option>
        </select>
      </div>
      <div class="col">
        <label>Severidad</label>
        <select id="severidad" class="form-control">
          <option value="baja">Baja</option>
          <option value="media">Media</option>
          <option value="alta">Alta</option>
        </select>
      </div>
      <div class="col d-flex align-items-end">
        <div class="form-check">
          <input type="checkbox" id="leida" class="form-check-input">
          <label class="form-check-label">Leída</label>
        </div>
      </div>
    </div>

    <button type="submit" class="btn btn-primary">Guardar</button>
    <button type="button" class="btn btn-secondary ms-2" onclick="limpiar()">Cancelar</button>
  </form>

  <!-- TABLA -->
  <table class="table mt-4">
    <thead>
      <tr>
        <th>Título</th>
        <th>Tipo</th>
        <th>Severidad</th>
        <th>Paciente</th>
        <th>Doctor</th>
        <th>Leída</th>
        <th>Fecha</th>
        <th>Acciones</th>
      </tr>
    </thead>
    <tbody id="tabla"></tbody>
  </table>

  <script type="module" src="./js/notificaciones.js"></script>

</body>
</html>
