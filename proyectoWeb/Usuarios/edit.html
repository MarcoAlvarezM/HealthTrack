<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Editar Usuario</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
</head>

<body class="container mt-4">

<h1 class="text-center">Editar Usuario</h1>

<form id="formUsuario">

  <div class="row">

    <div class="col-md-6 mb-3">
      <label>Correo</label>
      <input type="email" id="correo" class="form-control">
    </div>

    <div class="col-md-6 mb-3">
      <label>Contraseña (opcional)</label>
      <input type="password" id="contrasena" class="form-control">
    </div>

    <div class="col-md-6 mb-3">
      <label>Rol</label>
      <select id="role" class="form-control">
        <option value="">Seleccione</option>
        <option value="Paciente">Paciente</option>
        <option value="Doctor">Doctor</option>
      </select>
    </div>

    <div class="col-md-6 mb-3">
      <label>Activo</label>
      <select id="activo" class="form-control">
        <option value="">Seleccione</option>
        <option value="true">Activo</option>
        <option value="false">Inactivo</option>
      </select>
    </div>

  </div>

  <button type="submit" class="btn btn-primary">Actualizar</button>
  <a href="usuarios.html" class="btn btn-secondary">Cancelar</a>

</form>

<script>
$(document).ready(function () {

  const params = new URLSearchParams(window.location.search);
  const id = params.get("id");

  if (!id) {
    alert("ID no proporcionado");
    window.location.href = "usuarios.html";
    return;
  }

  // Cargar datos del usuario
  $.ajax({
    url: "http://localhost:3000/api/usuarios/" + id,
    type: "GET",
    success: function (u) {
      $("#correo").val(u.correo);
      $("#role").val(u.role);
      $("#activo").val(u.activo.toString());
    },
    error: function () {
      alert("Error al cargar usuario");
    }
  });

  // Enviar cambios
  $("#formUsuario").submit(function (e) {
    e.preventDefault();

    let datos = {};

    let correo = $("#correo").val();
    let contrasena = $("#contrasena").val();
    let role = $("#role").val();
    let activo = $("#activo").val();

    if (correo) datos.correo = correo;
    if (contrasena) datos.contrasena = contrasena;
    if (role) datos.role = role;
    if (activo !== "") datos.activo = (activo === "true");

    if (Object.keys(datos).length === 0) {
      alert("No hay cambios");
      return;
    }

    $.ajax({
      url: "http://localhost:3000/api/usuarios/" + id,
      type: "PUT",
      data: JSON.stringify(datos),
      contentType: "application/json",
      success: function () {
        alert("Usuario actualizado correctamente");
        window.location.href = "usuarios.html";
      },
      error: function () {
        alert("Error al actualizar usuario");
      }
    });

  });

});
</script>

</body>
</html>
