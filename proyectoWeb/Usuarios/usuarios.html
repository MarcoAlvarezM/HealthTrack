<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Usuarios</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
</head>

<body class="container mt-4">

  <h1 class="text-center">Lista de Usuarios</h1>

  <table class="table table-striped mt-4">
    <thead class="table-dark">
      <tr>
        <th>ID</th>
        <th>Correo</th>
        <th>Rol</th>
        <th>Creado</th>
        <th>Activo</th>
        <th>Acciones</th>
      </tr>
    </thead>
    <tbody id="tablaUsuarios"></tbody>
  </table>

  <script>
    $(document).ready(function () {
      listarUsuarios();

      function listarUsuarios() {
        $.ajax({
          url: "http://localhost:3000/api/usuarios",
          type: "GET",
          success: function (data) {

            console.log(data); 

            let tabla = $("#tablaUsuarios"); 
            tabla.empty();

            if (data.length === 0) {
              tabla.append("<tr><td colspan='6'>No hay datos</td></tr>");
              return;
            }

            data.forEach(p => {

              let fecha = p.creado ? new Date(p.creado).toLocaleDateString() : "";

              let fila = `<tr>
                <td>${p._id}</td>
                <td>${p.correo}</td>
                <td>${p.role}</td>
                <td>${fecha}</td>
                <td>${p.activo ? "Sí" : "No"}</td>
                <td>
                  <button class="btn btn-danger btn-sm" onclick="eliminar('${p._id}')">Eliminar</button>
                </td>
              </tr>`;

              tabla.append(fila);
            });
          },
          error: function () {
            alert("Error al cargar usuarios");
          }
        });
      }

      window.eliminar = function(id) {

        if (!confirm("¿Seguro que deseas eliminar este usuario?")) return;

        $.ajax({
          url: "http://localhost:3000/api/usuarios/" + id,
          type: "DELETE",
          success: function () {
            listarUsuarios();
          },
          error: function () {
            alert("Error al eliminar usuario");
          }
        });
      }

    });
  </script>
    <div class="col-md-4">
      <div class="card text-center shadow">
        <div class="card-body">
          <h5 class="card-title">Usuarios</h5>
          <p class="card-text">Agregar usuarios</p>
          <a href="create.html" class="btn btn-primary">Insertar</a>
        </div>
      </div>
    </div>
</body>
</html>
