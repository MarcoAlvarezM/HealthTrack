<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Detalles de Registro</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
  </head>

  <body class="container mt-4">
    <h1 class="text-center mb-4">Detalles del Registro</h1>

    <div class="row">
      <div class="col-md-8 offset-md-2">
        <div class="card shadow">
          <div class="card-header bg-dark text-white">
            <h5 class="mb-0">Información del Registro</h5>
          </div>
          <div class="card-body">
            <div class="row mb-3">
              <div class="col-md-6">
                <label class="form-label fw-bold">Usuario:</label>
                <p id="usuarioNombre" class="text-muted">Cargando...</p>
              </div>
              <div class="col-md-6">
                <label class="form-label fw-bold">Acción:</label>
                <p id="accion" class="text-muted">Cargando...</p>
              </div>
            </div>

            <div class="row mb-3">
              <div class="col-md-6">
                <label class="form-label fw-bold">Colección:</label>
                <p id="coleccion" class="text-muted">Cargando...</p>
              </div>
              <div class="col-md-6">
                <label class="form-label fw-bold">Documento ID:</label>
                <p id="documentoId" class="text-monospace text-muted">Cargando...</p>
              </div>
            </div>

            <div class="row mb-3">
              <div class="col-md-6">
                <label class="form-label fw-bold">Marca Temporal:</label>
                <p id="marcaTemporal" class="text-muted">Cargando...</p>
              </div>
              <div class="col-md-6">
                <label class="form-label fw-bold">Fecha Creación:</label>
                <p id="creado" class="text-muted">Cargando...</p>
              </div>
            </div>

            <div class="row mb-3">
              <div class="col-md-12">
                <label class="form-label fw-bold">Detalles:</label>
                <div class="alert alert-info">
                  <p id="detalles" class="mb-0 text-muted">Cargando...</p>
                </div>
              </div>
            </div>

            <div class="row">
              <div class="col-md-12">
                <a href="registros.html" class="btn btn-secondary">Volver a Registros</a>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      $(document).ready(function () {
        const params = new URLSearchParams(window.location.search);
        const id = params.get("id");

        if (!id) {
          alert("ID no proporcionado");
          window.location.href = "registros.html";
          return;
        }

        cargarRegistro();

        function cargarRegistro() {
          $.ajax({
            url: "http://localhost:3000/api/registros/" + id,
            type: "GET",
            success: function (r) {
              let usuarioNombre = r.usuarioId
                ? r.usuarioId.correo
                : "Sistema";
              let marcaTemporal = new Date(r.marca_temporal).toLocaleString(
                "es-ES",
              );
              let creado = new Date(r.creado).toLocaleString("es-ES");

              $("#usuarioNombre").text(usuarioNombre);
              $("#accion").html(
                `<span class="badge ${getBadgeAccion(r.accion)}">${r.accion}</span>`,
              );
              $("#coleccion").html(`<code>${r.coleccion}</code>`);
              $("#documentoId").text(r.documentoId);
              $("#marcaTemporal").text(marcaTemporal);
              $("#creado").text(creado);
              $("#detalles").text(r.detalles || "Sin detalles adicionales");
            },
            error: function () {
              alert("Error al cargar el registro");
              window.location.href = "registros.html";
            },
          });
        }

        window.getBadgeAccion = function (accion) {
          switch (accion.toUpperCase()) {
            case "CREATE":
              return "bg-success";
            case "READ":
              return "bg-info";
            case "UPDATE":
              return "bg-warning";
            case "DELETE":
              return "bg-danger";
            default:
              return "bg-secondary";
          }
        };
      });
    </script>
  </body>
</html>
