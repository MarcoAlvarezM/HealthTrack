<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Registros de Auditoría</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
  </head>

  <body class="container mt-4">
    <h1 class="text-center mb-4">Registros de Auditoría</h1>

    <!-- FILTROS -->
    <div class="row mb-4">
      <div class="col-md-3">
        <input
          type="text"
          id="filtroAccion"
          class="form-control"
          placeholder="Filtrar por acción"
        />
      </div>
      <div class="col-md-3">
        <input
          type="text"
          id="filtroColeccion"
          class="form-control"
          placeholder="Filtrar por colección"
        />
      </div>
      <div class="col-md-3">
        <input
          type="date"
          id="filtroFecha"
          class="form-control"
        />
      </div>
      <div class="col-md-3">
        <button class="btn btn-primary w-100" onclick="aplicarFiltros()">
          Filtrar
        </button>
      </div>
    </div>

    <!-- TABLA -->
    <table class="table table-striped table-hover shadow">
      <thead class="table-dark">
        <tr>
          <th>Usuario</th>
          <th>Acción</th>
          <th>Colección</th>
          <th>Documento ID</th>
          <th>Marca Temporal</th>
          <th>Detalles</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody id="tablaRegistros"></tbody>
    </table>

    <script>
      $(document).ready(function () {
        listar();

        function listar() {
          $.ajax({
            url: "http://localhost:3000/api/registros",
            type: "GET",
            success: function (data) {
              let tabla = $("#tablaRegistros");
              tabla.empty();

              if (data.length === 0) {
                tabla.append(
                  "<tr><td colspan='7'>No hay registros de auditoría</td></tr>",
                );
                return;
              }

              data.forEach((r) => {
                let marca = new Date(r.marca_temporal).toLocaleString("es-ES");
                let usuarioNombre = r.usuarioId
                  ? r.usuarioId.correo
                  : "Sistema";
                let detallesCorto = r.detalles
                  ? r.detalles.substring(0, 50) + (r.detalles.length > 50 ? "..." : "")
                  : "-";

                tabla.append(`
            <tr>
              <td>
                <small>${usuarioNombre}</small>
              </td>
              <td>
                <span class="badge ${getBadgeAccion(r.accion)}">${r.accion}</span>
              </td>
              <td>
                <code>${r.coleccion}</code>
              </td>
              <td>
                <small>${r.documentoId}</small>
              </td>
              <td>
                <small>${marca}</small>
              </td>
              <td>
                <small>${detallesCorto}</small>
              </td>
              <td>
                <button class="btn btn-info btn-sm" onclick="window.location.href='detalles.html?id=${r._id}'">Ver</button>
              </td>
            </tr>
          `);
              });
            },
            error: function () {
              alert("Error al cargar registros");
            },
          });
        }

        window.getBadgeAccion = function (accion) {
          switch (accion.toUpperCase()) {
            case "CREATE":
              return "bg-success";
            case "READ":
              return "bg-info";
            case "UPDATE":
              return "bg-warning";
            case "DELETE":
              return "bg-danger";
            default:
              return "bg-secondary";
          }
        };

        window.aplicarFiltros = function () {
          let accion = $("#filtroAccion").val().toUpperCase();
          let coleccion = $("#filtroColeccion").val().toUpperCase();
          let fecha = $("#filtroFecha").val();

          $.ajax({
            url: "http://localhost:3000/api/registros",
            type: "GET",
            data: {
              accion: accion || undefined,
              coleccion: coleccion || undefined,
              fecha: fecha || undefined,
            },
            success: function (data) {
              let tabla = $("#tablaRegistros");
              tabla.empty();

              if (data.length === 0) {
                tabla.append(
                  "<tr><td colspan='7'>No hay registros que coincidan con los filtros</td></tr>",
                );
                return;
              }

              data.forEach((r) => {
                let marca = new Date(r.marca_temporal).toLocaleString("es-ES");
                let usuarioNombre = r.usuarioId
                  ? r.usuarioId.correo
                  : "Sistema";
                let detallesCorto = r.detalles
                  ? r.detalles.substring(0, 50) + (r.detalles.length > 50 ? "..." : "")
                  : "-";

                tabla.append(`
              <tr>
                <td>
                  <small>${usuarioNombre}</small>
                </td>
                <td>
                  <span class="badge ${getBadgeAccion(r.accion)}">${r.accion}</span>
                </td>
                <td>
                  <code>${r.coleccion}</code>
                </td>
                <td>
                  <small>${r.documentoId}</small>
                </td>
                <td>
                  <small>${marca}</small>
                </td>
                <td>
                  <small>${detallesCorto}</small>
                </td>
                <td>
                  <button class="btn btn-info btn-sm" onclick="window.location.href='detalles.html?id=${r._id}'">Ver</button>
                </td>
              </tr>
            `);
              });
            },
            error: function () {
              alert("Error al filtrar registros");
            },
          });
        };
      });
    </script>
  </body>
</html>
