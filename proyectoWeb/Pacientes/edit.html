<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Editar Paciente</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
  </head>

  <body class="container mt-4">
    <h1 class="text-center">Editar Paciente</h1>

    <form id="formPaciente">
      <div class="row">
        <div class="col-md-6 mb-3">
          <label>Usuario ID</label>
          <select id="usuario_id" class="form-control"></select>
        </div>

        <div class="col-md-6 mb-3">
          <label>Nombre</label>
          <input type="text" id="nombre" class="form-control" />
        </div>

        <div class="col-md-6 mb-3">
          <label>Apellido</label>
          <input type="text" id="apellido" class="form-control" />
        </div>

        <div class="col-md-6 mb-3">
          <label>Fecha Nacimiento</label>
          <input type="date" id="fechaNacimiento" class="form-control" />
        </div>

        <div class="col-md-6 mb-3">
          <label>Género</label>
          <select id="genero" class="form-control">
            <option value="">Seleccione</option>
            <option value="masculino">Masculino</option>
            <option value="femenino">Femenino</option>
          </select>
        </div>

        <div class="col-md-6 mb-3">
          <label>Peso (kg)</label>
          <input type="number" id="peso" class="form-control" />
        </div>

        <div class="col-md-6 mb-3">
          <label>Altura (cm)</label>
          <input type="number" id="altura" class="form-control" />
        </div>

        <div class="col-md-6 mb-3">
          <label>Tipo de Sangre</label>
          <input type="text" id="tipoSangre" class="form-control" />
        </div>

        <div class="col-md-12 mb-3">
          <label>Padecimientos (separados por coma)</label>
          <input type="text" id="padecimientos" class="form-control" />
        </div>
      </div>

      <button type="submit" class="btn btn-primary">Actualizar</button>
      <a href="pacientes.html" class="btn btn-secondary">Cancelar</a>
    </form>

    <script>
      $(document).ready(function () {
        const params = new URLSearchParams(window.location.search);
        const id = params.get("id");

        if (!id) {
          alert("ID no proporcionado");
          window.location.href = "pacientes.html";
          return;
        }

        // Cargar usuarios en select
        $.get("http://localhost:3000/api/usuarios", function (usuarios) {
          usuarios.forEach((u) => {
            $("#usuario_id").append(
              <option value="${u._id}">${u.correo}</option>,
            );
          });

          $.ajax({
            url: "http://localhost:3000/api/pacientes/" + id,
            type: "GET",
            success: function (p) {
              $("#usuario_id").val(p.usuario_id._id);
              $("#nombre").val(p.nombre);
              $("#apellido").val(p.apellido);
              $("#fechaNacimiento").val(p.fechaNacimiento?.split("T")[0]);
              $("#genero").val(p.genero);
              $("#peso").val(p.peso);
              $("#altura").val(p.altura);
              $("#tipoSangre").val(p.tipoSangre);
              $("#padecimientos").val(
                p.padecimientos ? p.padecimientos.join(",") : "",
              );
            },
          });
        });

        // Enviar cambios
        $("#formPaciente").submit(function (e) {
          e.preventDefault();

          let datos = {};

          if ($("#usuario_id").val()) datos.usuario_id = $("#usuario_id").val();
          if ($("#nombre").val()) datos.nombre = $("#nombre").val();
          if ($("#apellido").val()) datos.apellido = $("#apellido").val();
          if ($("#fechaNacimiento").val())
            datos.fechaNacimiento = $("#fechaNacimiento").val();
          if ($("#genero").val()) datos.genero = $("#genero").val();
          if ($("#peso").val()) datos.peso = parseFloat($("#peso").val());
          if ($("#altura").val()) datos.altura = parseFloat($("#altura").val());
          if ($("#tipoSangre").val()) datos.tipoSangre = $("#tipoSangre").val();

          if ($("#padecimientos").val()) {
            datos.padecimientos = $("#padecimientos").val().split(",");
          }

          if (Object.keys(datos).length === 0) {
            alert("No hay cambios");
            return;
          }

          $.ajax({
            url: "http://localhost:3000/api/pacientes/" + id,
            type: "PUT",
            data: JSON.stringify(datos),
            contentType: "application/json",
            success: function (response) {
              console.log(response);
              alert("Paciente actualizado");
              window.location.href = "pacientes.html";
            },
            error: function () {
              alert("Error al actualizar");
            },
          });
        });
      });
    </script>
  </body>
</html>
