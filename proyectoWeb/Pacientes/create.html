<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Crear Paciente</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
  </head>

  <body class="container mt-4">
    <h1 class="text-center">Registrar Paciente</h1>

    <form id="formPaciente">
      <div class="row">
        <div class="col-md-6 mb-3">
          <label>Usuario</label>
          <select id="usuario_id" class="form-control" required></select>
        </div>

        <div class="col-md-6 mb-3">
          <label>Nombre</label>
          <input type="text" id="nombre" class="form-control" required />
        </div>

        <div class="col-md-6 mb-3">
          <label>Apellido</label>
          <input type="text" id="apellido" class="form-control" required />
        </div>

        <div class="col-md-6 mb-3">
          <label>Fecha Nacimiento</label>
          <input
            type="date"
            id="fechaNacimiento"
            class="form-control"
            required
          />
        </div>

        <div class="col-md-6 mb-3">
          <label>Género</label>
          <select id="genero" class="form-control" required>
            <option value="">Seleccione</option>
            <option value="masculino">Masculino</option>
            <option value="femenino">Femenino</option>
          </select>
        </div>

        <div class="col-md-6 mb-3">
          <label>Peso (kg)</label>
          <input type="number" id="peso" class="form-control" required />
        </div>

        <div class="col-md-6 mb-3">
          <label>Altura (cm)</label>
          <input type="number" id="altura" class="form-control" required />
        </div>

        <div class="col-md-6 mb-3">
          <label>Tipo de Sangre</label>
          <input type="text" id="tipoSangre" class="form-control" required />
        </div>

        <div class="col-md-12 mb-3">
          <label>Padecimientos (separados por coma)</label>
          <input type="text" id="padecimientos" class="form-control" />
        </div>
      </div>

      <button type="submit" class="btn btn-primary">Guardar</button>
      <button type="reset" class="btn btn-danger">Limpiar</button>
    </form>

    <script>
      $(document).ready(function () {
        cargarUsuarios();

        function cargarUsuarios() {
          $.ajax({
            url: "http://localhost:3000/api/usuarios",
            type: "GET",
            success: function (data) {
              let select = $("#usuario_id");
              select.empty();

              select.append('<option value="">Seleccione un usuario</option>');

              data.forEach((u) => {
                select.append(`<option value="${u._id}">${u.correo} (${u.role})</option>`,
                );
              });
            },
            error: function () {
              alert("Error al cargar usuarios");
            },
          });
        }
        $("#formPaciente").submit(function (e) {
          e.preventDefault();

          let datos = {
            usuario_id: $("#usuario_id").val(),
            nombre: $("#nombre").val(),
            apellido: $("#apellido").val(),
            fechaNacimiento: $("#fechaNacimiento").val(),
            genero: $("#genero").val(),
            peso: parseFloat($("#peso").val()),
            altura: parseFloat($("#altura").val()),
            tipoSangre: $("#tipoSangre").val(),
            padecimientos: $("#padecimientos").val()
              ? $("#padecimientos").val().split(",")
              : [],
          };

          if (!datos.usuario_id) {
            alert("Debe seleccionar un usuario");
            return;
          }

          if (!datos.nombre || !datos.apellido) {
            alert("Faltan datos");
            return;
          }

          console.log("Datos enviados:", datos);

          $.ajax({
            type: "POST",
            url: "http://localhost:3000/api/pacientes",
            data: JSON.stringify(datos),
            contentType: "application/json",
            success: function (response) {
              console.log(response);
              alert("Paciente creado correctamente");
              $("#formPaciente")[0].reset();
            },
            error: function () {
              alert("Error al guardar los datos");
            },
          });
        });
      });
    </script>
  </body>
</html>
