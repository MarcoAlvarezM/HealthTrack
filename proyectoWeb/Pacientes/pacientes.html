<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Pacientes</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
</head>

<body class="container mt-4">

  <h1 class="text-center">Lista de Pacientes</h1>

  <!-- TABLA -->
  <table class="table table-striped mt-4">
    <thead class="table-dark">
      <tr>
        <th>ID</th>
        <th>Nombre</th>
        <th>Apellido</th>
        <th>Género</th>
        <th>Peso</th>
        <th>Altura</th>
        <th>Tipo Sangre</th>
        <th>Padecimientos</th>
        <th>Acciones</th>
      </tr>
    </thead>
    <tbody id="tablaPacientes"></tbody>
  </table>

  <script>
    $(document).ready(function () {
      listarPacientes();

      function listarPacientes() {
        $.ajax({
          url: "http://localhost:3000/api/pacientes",
          type: "GET",
          success: function (data) {
            let tabla = $("#tablaPacientes");
            tabla.empty();

            if (data.length === 0) {
              tabla.append("<tr><td colspan='9'>No hay datos</td></tr>");
              return;
            }

            data.forEach(p => {
              let fila = `<tr>
                <td>${p._id}</td>
                <td>${p.nombre}</td>
                <td>${p.apellido}</td>
                <td>${p.genero}</td>
                <td>${p.peso}</td>
                <td>${p.altura}</td>
                <td>${p.tipoSangre}</td>
                <td>${p.padecimientos.join(", ")}</td>
                <td>
                  <button class="btn btn-warning btn-sm"onclick="window.location.href='edit.html?id=${p._id}'">Editar</button>
                  <button class="btn btn-danger btn-sm" onclick="eliminar(${p._id})">Eliminar</button>
                </td>
              </tr>`;

              tabla.append(fila);
            });
          },
          error: function () {
            alert("Error al cargar pacientes");
          }
        });
      }


      window.eliminar = function(id) {
        $.ajax({
          url: "http://localhost:3000/api/pacientes/" + id,
          type: "DELETE",
          success: function () {
            listarPacientes();
          }
        });
      }
    });
  </script>
  <div class="row mt-5">

    <!-- USUARIOS -->
    <div class="col-md-4">
      <div class="card text-center shadow">
        <div class="card-body">
          <h5 class="card-title">Pacientes</h5>
          <p class="card-text">Agregar pacientes</p>
          <a href="create.html" class="btn btn-primary">Insertar</a>
        </div>
      </div>
    </div>
</body>
</html>
