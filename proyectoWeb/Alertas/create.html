<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Alertas</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
  </head>

  <body class="container mt-4">
    <h1 class="text-center">Lista Alertas</h1>

    <form id="formAlertas" class="mt-3">
      <div class="row mb-2">
        <div class="col">
          <label>Paciente</label>
          <select id="paciente_id" class="form-control" required></select>
        </div>

        <div class="col">
          <label>Doctor</label>
          <select id="doctor_id" class="form-control" required></select>
        </div>

        <div class="col">
          <label>Regla</label>
          <select id="regla_id" class="form-control" required></select>
        </div>
      </div>

      <div class="mb-2">
        <label>Mensaje</label>
        <textarea id="mensaje" class="form-control" required></textarea>
      </div>

      <div class="row mb-2">
        <div class="col">
          <label>Severidad</label>
          <select id="severidad" class="form-control">
            <option value="baja">Baja</option>
            <option value="media">Media</option>
            <option value="alta">Alta</option>
          </select>
        </div>

        <div class="col">
          <label>Estado</label>
          <select id="estado" class="form-control">
            <option value="pendiente">Pendiente</option>
            <option value="atendida">Atendida</option>
            <option value="cancelada">Cancelada</option>
          </select>
        </div>

        <div class="col d-flex align-items-end">
          <div class="form-check">
            <input
              type="checkbox"
              id="activo"
              class="form-check-input"
              checked
            />
            <label class="form-check-label">Activo</label>
          </div>
        </div>
      </div>

      <button type="submit" class="btn btn-primary">Guardar</button>
    </form>

    <script>
      $(document).ready(function () {
        $.get("http://localhost:3000/api/pacientes", function (data) {
          $("#paciente_id").append(`<option value="">Seleccione...</option>`);
          data.forEach((p) => {
            $("#paciente_id").append(
              `<option value="${p._id}">${p.nombre} ${p.apellido}</option>`,
            );
          });
        });

        $.get("http://localhost:3000/api/doctores", function (data) {
          $("#doctor_id").append(`<option value="">Seleccione...</option>`);
          data.forEach((d) => {
            $("#doctor_id").append(
              `<option value="${d._id}">${d.nombre} (${d.especialidad})</option>`,
            );
          });
        });

        $.get("http://localhost:3000/api/reglas-alertas", function (data) {
          $("#regla_id").append(`<option value="">Seleccione...</option>`);
          data.forEach((r) => {
            $("#regla_id").append(
              `<option value="${r._id}">${r.nombre}</option>`,
            );
          });
        });

$("#formAlertas").submit(function (e) {
  e.preventDefault();

  let datos = {
    paciente_id: $("#paciente_id").val(),
    doctor_id: $("#doctor_id").val(),
    regla_id: $("#regla_id").val(),
    mensaje: $("#mensaje").val(),
    severidad: $("#severidad").val(),
    estado: $("#estado").val(),
    activo: $("#activo").is(":checked"),
    activadoEn: new Date()
  };

  console.log(datos);

  $.ajax({
    url: "http://localhost:3000/api/alertas",
    type: "POST",
    data: JSON.stringify(datos),
    contentType: "application/json",
    success: function (response) {
      console.log(response);
      alert("Alerta creada");
      $("#formAlertas")[0].reset();
    },
    error: function (err) {
      console.log(err.responseText);
      alert("Error al guardar");
    }
  });
});
});
    </script>
  </body>
</html>
