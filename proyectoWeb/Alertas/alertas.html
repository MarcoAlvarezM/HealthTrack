<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Alertas</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
</head>

<body class="container mt-4">

<h1 class="text-center">Lista Alertas</h1>

<table class="table mt-4">
  <thead>
    <tr>
      <th>Paciente</th>
      <th>Doctor</th>
      <th>Regla</th>
      <th>Mensaje</th>
      <th>Severidad</th>
      <th>Estado</th>
      <th>Fecha</th>
      <th>Acciones</th>
    </tr>
  </thead>
  <tbody id="tabla"></tbody>
</table>

<script>
$(document).ready(function () {

  listar();

  function listar() {
    $.ajax({
      url: "http://localhost:3000/api/alertas",
      type: "GET",
      success: function (data) {

        let tabla = $("#tabla");
        tabla.empty();

        if (data.length === 0) {
          tabla.append("<tr><td colspan='8'>No hay datos</td></tr>");
          return;
        }

        data.forEach(a => {
          let fila = `
          <tr>
            <td>${a.paciente_id?.nombre || a.paciente_id}</td>
            <td>${a.doctor_id?.nombre || a.doctor_id}</td>
            <td>${a.regla_id?.nombre || a.regla_id}</td>
            <td>${a.mensaje}</td>
            <td>${a.severidad}</td>
            <td>${a.estado}</td>
            <td>${new Date(a.activadoEn).toLocaleString()}</td>
            <td>
              <button class="btn btn-danger btn-sm" onclick="eliminar('${a._id}')">Eliminar</button>
            </td>
          </tr>`;
          tabla.append(fila);
        });

      }
    });
  }

  window.eliminar = function(id) {
    $.ajax({
      url: "http://localhost:3000/api/alertas/" + id,
      type: "DELETE",
      success: function () {
        listar();
      }
    });
  }

});
</script>

<div class="row mt-5">
  <div class="col-md-4">
    <div class="card text-center shadow">
      <div class="card-body">
        <h5 class="card-title">Alertas</h5>
        <p class="card-text">Agregar alertas</p>
        <a href="create.html" class="btn btn-primary">Insertar</a>
      </div>
    </div>
  </div>
</div>

</body>
</html>
